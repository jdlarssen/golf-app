# Secret scanning (#1317). A DELIBERATELY separate workflow from ci.yml:
# ci.yml has paths-ignore for **.md/docs/** (quota trim #1195), but secrets
# leak into markdown and docs just as easily as into code — this gate must
# see every PR regardless of which files changed.
#
# One-time history cleanup happened in #1197 (email scrub + staging-key
# removal via filter-repo). This workflow is the ONGOING gate that keeps the
# history clean: gitleaks on every PR, plus a weekly full-history sweep so a
# leak that somehow lands on main is still caught. Baseline verified
# 2026-07-21: full-history scan (2 889 commits) with the repo config
# (.gitleaks.toml allowlist + .gitleaksignore fingerprints) → 0 findings.
#
# gitleaks-action requires a GITLEAKS_LICENSE only for ORGANIZATION repos;
# this repo lives under a user account, so none is needed.
name: Secret scan

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0' # weekly full-history sweep, Sunday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write # PR summary comment from the action + the failure alert below
  pull-requests: write

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — leaks hide in old commits, not just the diff

      # Picks up .gitleaks.toml + .gitleaksignore from the repo root
      # automatically. On PRs it scans the PR's commits; on schedule/dispatch
      # it scans the full history.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # A red scheduled run must never die silently in the Actions tab
      # (fail-closed, epic #1073) — PR failures are visible on the PR itself,
      # so alert only for schedule/dispatch. Deduped like schema-drift.yml.
      - name: Open alert issue on failure
        if: failure() && github.event_name != 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          TITLE="CI-vakt: secret-scan rød"
          bash .github/scripts/discord-notify.sh "🔴 **Secret-scan rød** — mulig lekket nøkkel i historikken. $RUN_URL"
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "in:title \"$TITLE\"" --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Åpent varsel-issue finnes allerede — hopper over."
            exit 0
          fi
          BODY=$(printf 'Den ukentlige secret-skanningen fant noe (eller selve kjøringen røk).\n\nKjøring: %s\n\nEr funnet reelt: roter nøkkelen FØRST, fjern den fra historikken etterpå (#1197-mønsteret). Falsk positiv: legg mønsteret i .gitleaks.toml eller fingerprintet i .gitleaksignore. Dette issuet lukkes når skanningen er grønn igjen.' "$RUN_URL")
          gh api "repos/$GITHUB_REPOSITORY/issues" \
            -f title="$TITLE" \
            -f body="$BODY" \
            -f "labels[]=security" \
            -F milestone=9
