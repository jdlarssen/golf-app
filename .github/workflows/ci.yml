# Pre-merge gate. Runs on every PR to main so schema-drift / type / test
# regressions are caught BEFORE merge — Vercel only builds AFTER merge, which
# is too late (see #673, and the #641/#642/#647 prod-break cluster).
#
# typecheck + test + lint are all BLOCKING (the pre-existing lint errors were
# cleaned in #692). lint fails on errors only; warnings don't block.
#
# Real enforcement is the local pre-push hook (.githooks/pre-push), which runs
# the same three checks BEFORE a push leaves the machine — GitHub branch
# protection is Pro-only on private repos, so this CI job is the visible
# backstop on the PR rather than a hard merge gate.
name: CI

on:
  pull_request:
    branches: [main]
    # Quota trim (#1195): docs-/contract-only PRs run no jobs — the local
    # pre-push hook already gated them, and md/docs/.forge files can't break
    # the build or the e2e flows.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.forge/**'
  # Manual trigger so the full gate can run against staging on demand — e.g. to
  # verify main directly after several PRs land. CI otherwise only runs on
  # pull_request, so main itself is never re-gated post-merge.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (blocking — schema drift fails here)
        run: npm run typecheck

      - name: Test (blocking)
        run: npm test

      - name: Lint (blocking)
        run: npm run lint

      # Guard-hook fixtures (#1074): the prod firewall + bash-guard rules are
      # plain bash/jq, so vitest never exercises them — this is their only gate.
      - name: Guard hooks (blocking)
        run: bash tests/hooks/guard.test.sh

  # Authenticated e2e gate (#674): the golden-path scoring loop + cup/liga
  # lifecycle smoke — the flows where #641/#642/#647 lived. These run against the
  # torny-staging Supabase (testing moved OFF prod — #717/PR #719 repointed the
  # secrets below to staging; prod is never written by tests), so they need
  # service-role secrets + two pre-seeded test users. They self-skip without the
  # env (see e2e/_helpers/games.ts), but booting the dev server still needs the
  # public Supabase keys — so this whole job is gated OFF until activated.
  #
  # OWNER ACTION TO ACTIVATE (Settings → Secrets and variables → Actions):
  #   1. Add repository SECRETS: NEXT_PUBLIC_SUPABASE_URL,
  #      NEXT_PUBLIC_SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY,
  #      E2E_ADMIN_EMAIL (an is_admin user), E2E_PLAYER_EMAIL (a separate
  #      profile-complete user).
  #   2. Add repository VARIABLE RUN_E2E = true.
  # Until RUN_E2E is set this job is skipped (never red), so it can't block a PR.
  # Activated 2026-06-17: all 5 secrets + RUN_E2E=true are configured (#674).
  #
  # Scope: `npm run e2e:gate` runs the @gate-tagged specs — the three #674 tests
  # (golden-path + cup + the liga finished-flight #647 reproducer) plus the five
  # signup/invitation specs brought in by #698 (Resend stubbed via
  # RESEND_STUB_SEND + selfreg limit disabled below, norsk-copy asserts swapped
  # for data-testid). Still excluded: the older #453 liga create/empty-state
  # tests (flaky).
  e2e:
    if: ${{ vars.RUN_E2E == 'true' }}
    runs-on: ubuntu-latest
    # #1272: serialize e2e across ALL PRs. The @gate suite runs against the
    # shared torny-staging DB with the SAME two test users (E2E_ADMIN_EMAIL /
    # E2E_PLAYER_EMAIL). Two PRs running e2e at once collided on those users and
    # flaked (near-proof: PR #1254 + #1257 both red ~22:00, both green on
    # sequential re-run). A fixed group name (NOT github.ref) forces one e2e run
    # at a time across every branch; cancel-in-progress: false lets the running
    # one finish rather than being killed mid-flight. Tradeoff: GitHub keeps at
    # most ONE pending run per group — with 3+ concurrent PRs a queued slot can
    # be dropped and need a manual re-run. Accepted for solo-dev PR volume;
    # per-run unique users is the scale-triggered escalation if this bites.
    concurrency:
      group: e2e-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # #1095: npm ci intermittently drops (or corrupts) the platform-specific
      # Turbopack/SWC native binding — the npm optional-dependency lottery. The
      # lockfile lists all 8 @next/swc-* platforms, so this is a runtime install
      # flake, not a missing lockfile entry. Next 16 runs `next dev` on Turbopack
      # by default, which HARD-requires this binding: absent → the dev server
      # refuses to boot ("native bindings are not available … only WASM"), so
      # every spec dies with ERR_CONNECTION_REFUSED; partial/corrupt → the slow
      # WASM path blows 5s toBeVisible timeouts across unrelated specs.
      # `require()` is the exact call Next uses to pick native-vs-WASM (the
      # package's main IS the .node addon), so its success is the precise gate.
      # Reinstall once if the lottery dropped it, then fail loudly if that fails
      # — a named, fast failure beats a 2-minute mystery boot-nekt.
      # Binding name is tied to the linux/x64/glibc `ubuntu-latest` runner above.
      - name: "Ensure Turbopack native binding (npm optional-dep guard, #1095)"
        run: |
          BINDING=@next/swc-linux-x64-gnu
          if node -e "require('$BINDING')" 2>/dev/null; then
            echo "$BINDING loads — Turbopack will boot on native bindings."
            exit 0
          fi
          echo "::warning::$BINDING missing/corrupt after npm ci — reinstalling (see #1095)"
          npm install --no-save --force "$BINDING@$(node -p "require('next/package.json').version")"
          node -e "require('$BINDING')"

      # Quota trim (#1195): the chromium download is ~150MB per run — cache it
      # keyed on the lockfile; `playwright install` below no-ops on a hit and
      # tops up after a Playwright version bump (restore-keys fallback).
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            pw-${{ runner.os }}-

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Authenticated e2e (golden-path + cup/liga smoke)
        run: npm run e2e:gate
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_PLAYER_EMAIL: ${{ secrets.E2E_PLAYER_EMAIL }}
          # Stub Resend in CI so the invite-notification path reaches status=sent
          # without a real API key. Prod never sets this variable (#698).
          RESEND_STUB_SEND: 'true'
          # Disable the self-registration rate limit (5 signups/24h per player)
          # so the shared E2E_PLAYER doesn't exhaust its quota across repeated
          # @gate runs against staging. Prod never sets this variable (#698).
          SELFREG_RATE_LIMIT_DISABLED: 'true'

      # Heavier real-generator lifecycle lanes (#736). The cup lane drives the
      # PPR-heavy 5-step wizard + creates/deletes ephemeral auth users on shared
      # staging — too much failure surface to gate every merge on. continue-on-
      # error keeps a flake from blocking a PR while still surfacing a real
      # regression in the cup match-generation write path.
      # Quota trim (#1195): on-demand only (workflow_dispatch). It was a
      # non-blocking informational lane on every PR and the single biggest
      # minute consumer; the night runner covers these flows locally per #1183.
      - name: Authenticated e2e — lifecycle (on-demand only, non-blocking)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        continue-on-error: true
        run: npm run e2e:lifecycle
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_PLAYER_EMAIL: ${{ secrets.E2E_PLAYER_EMAIL }}
          RESEND_STUB_SEND: 'true'
          SELFREG_RATE_LIMIT_DISABLED: 'true'

      # #1132: when a @gate run goes red the flake could only be guessed at from
      # the text log — no trace, no screenshot. Upload the Playwright HTML report
      # + traces/screenshots so the next red run is inspectable (the real
      # root-cause hunt per #1073). `!cancelled()` runs this even after the gate
      # step fails (the case we care about) and after the continue-on-error
      # lifecycle lane; `if-no-files-found: ignore` keeps a green run (no traces)
      # from failing here.
      - name: Upload Playwright report + traces (#1132)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
