# Pre-merge gate. Runs on every PR to main so schema-drift / type / test
# regressions are caught BEFORE merge — Vercel only builds AFTER merge, which
# is too late (see #673, and the #641/#642/#647 prod-break cluster).
#
# typecheck + test are BLOCKING. lint is non-blocking for now because the repo
# has 22 pre-existing lint errors (the deliberate /legal/privacy <a> pattern);
# once those are cleaned, drop `continue-on-error` to make lint blocking too.
#
# Owner action to enforce: Settings → Branches → add a branch-protection rule
# for `main` requiring the "verify" check to pass before merge.
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (blocking — schema drift fails here)
        run: npm run typecheck

      - name: Test (blocking)
        run: npm test

      - name: Lint (non-blocking until pre-existing errors are cleaned)
        run: npm run lint
        continue-on-error: true

  # Authenticated e2e gate (#674): the golden-path scoring loop + cup/liga
  # lifecycle smoke — the flows where #641/#642/#647 lived. These run against the
  # real Supabase (prod-DB per "Production-only testing"), so they need
  # service-role secrets + two pre-seeded test users. They self-skip without the
  # env (see e2e/_helpers/games.ts), but booting the dev server still needs the
  # public Supabase keys — so this whole job is gated OFF until activated.
  #
  # OWNER ACTION TO ACTIVATE (Settings → Secrets and variables → Actions):
  #   1. Add repository SECRETS: NEXT_PUBLIC_SUPABASE_URL,
  #      NEXT_PUBLIC_SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY,
  #      E2E_ADMIN_EMAIL (an is_admin user), E2E_PLAYER_EMAIL (a separate
  #      profile-complete user).
  #   2. Add repository VARIABLE RUN_E2E = true.
  # Until RUN_E2E is set this job is skipped (never red), so it can't block a PR.
  # Activated 2026-06-17: all 5 secrets + RUN_E2E=true are configured (#674).
  #
  # Scope: `npm run e2e:gate` runs ONLY the three #674 specs (golden-path +
  # cup + liga). The pre-existing signup/invitation specs additionally need a
  # Resend key in CI and have separate copy-drift issues — tracked in #698, not
  # part of this safety-net gate.
  e2e:
    if: ${{ vars.RUN_E2E == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Authenticated e2e (golden-path + cup/liga smoke)
        run: npm run e2e:gate
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_PLAYER_EMAIL: ${{ secrets.E2E_PLAYER_EMAIL }}
