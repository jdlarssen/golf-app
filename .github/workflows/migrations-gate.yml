# Migrations gate (#1318, hardened via #1320). schema-drift.yml COMPARES
# generated types against prod, but nothing in CI ever APPLIES the migrations —
# a migration with a syntax error, a broken ordering dependency, or an RLS
# regression used to surface only at the manual staging apply. This job boots a
# real local Postgres, applies every migration in supabase/migrations/ in
# order (any failure = red job), then runs the pgTAP suites in supabase/tests/
# — the hostile-request RLS rig from #440 that npm's test:rls self-skips
# without a local stack, so this is the suites' only automated gate.
#
# WHY migrations are applied with psql AS postgres and not by `supabase start`
# (#1320): hosted projects apply migrations as the `postgres` role
# (dashboard/MCP), and Supabase's default privileges are configured FOR ROLE
# postgres — tables created that way get the platform's ALL-grants for
# anon/authenticated/service_role, which later hardening migrations (e.g.
# 0142) selectively revoke. The CLI's own apply runs as supabase_admin, so
# those default grants never materialize and 12/17 suites failed with 42501.
# The psql-as-postgres path is the one #440 verified green (19/19) — see
# supabase/tests/README.md path B. The stack is booted with the migrations
# dir temporarily empty to keep the CLI from applying them first.
#
# Quota (#1195): path-filtered to migration/test changes only — ordinary code
# PRs never run this. The workflow file itself is in the paths list so the PR
# that introduces or edits the gate exercises it for real.
name: Migrations gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'supabase/config.toml'
      - '.github/workflows/migrations-gate.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: migrations-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Distinct job name on purpose — ci.yml already exposes a check called
  # "verify", and two identical names in the PR check list are unreadable.
  migrations:
    runs-on: ubuntu-latest
    # Backstop against a hung container pull/boot — the whole run normally
    # finishes in a few minutes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # The CLI's schema_migrations bookkeeping keys on the number prefix, so
      # duplicates break `supabase db` flows (#533). The psql apply below
      # wouldn't catch a duplicate — keep the invariant guarded here.
      - name: Guard unique migration number prefixes (#533)
        run: |
          dups=$(ls supabase/migrations/*.sql | xargs -n1 basename | sed 's/_.*//' | sort | uniq -d)
          if [ -n "$dups" ]; then
            echo "::error::Duplicate migration number prefixes: $dups"
            exit 1
          fi

      # Boot the stack on an EMPTY migrations dir (see header — the CLI would
      # apply them as supabase_admin, which skews grants vs prod).
      - name: Boot bare local stack
        run: |
          mv supabase/migrations /tmp/torny_migrations
          mkdir supabase/migrations
          supabase start
          rmdir supabase/migrations
          mv /tmp/torny_migrations supabase/migrations

      # Hosted-parity default privileges (#1320, measured 2026-07-21): hosted
      # projects ship ALTER DEFAULT PRIVILEGES for role postgres in schema
      # public granting ALL on tables/sequences/functions to the API roles —
      # the CLI image's bootstrap does not (its postgres-defacl carries only
      # D/x/t on tables and no EXECUTE on functions; see run 29831991187's
      # dump). Setting the hosted shape BEFORE the apply means every CREATE
      # gets hosted-like grants and later hardening revokes (0142, 0140,
      # 0137…) land on top in prod chronology. A blanket re-grant AFTER the
      # apply would clobber exactly those revokes — do not "simplify" to that.
      - name: Normalize default privileges to hosted shape (#1320)
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres \
            -v ON_ERROR_STOP=1 <<'SQL'
          alter default privileges for role postgres in schema public
            grant all on tables to anon, authenticated, service_role;
          alter default privileges for role postgres in schema public
            grant all on sequences to anon, authenticated, service_role;
          alter default privileges for role postgres in schema public
            grant all on functions to anon, authenticated, service_role;
          SQL

      # Prod-parity apply: every migration in filename order, as postgres,
      # ON_ERROR_STOP so the first failing statement reds the job with the
      # file name in the log. Connection values from supabase/config.toml
      # ([db] port 54322) + supabase/tests/README.md.
      - name: Apply all migrations as postgres (prod-parity grants, #1320)
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "== $f"
            PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres \
              -v ON_ERROR_STOP=1 -q -f "$f"
          done

      - name: Run pgTAP suites (supabase/tests/)
        run: supabase test db

      # Post-mortem aid (#1320): on a red suite run, dump the ACL ground truth
      # so a grants-shaped failure can be diagnosed from the log instead of
      # guessed at — the 42501 cluster in #1320 took two blind attempts before
      # this dump pinpointed the default-privileges gap in one.
      - name: Dump grants diagnostics (#1320)
        if: failure()
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres <<'SQL'
          select relname, pg_get_userbyid(relowner) as owner, relacl
            from pg_class c join pg_namespace n on n.oid = c.relnamespace
           where n.nspname = 'public' and relkind = 'r'
             and relname in ('scores','game_players','games','group_members','green_pins','users','invitations');
          select pg_get_userbyid(defaclrole) as defacl_for_role, defaclnamespace::regnamespace as in_schema,
                 defaclobjtype, defaclacl
            from pg_default_acl;
          select r.rolname as role, m.rolname as member
            from pg_auth_members am
            join pg_roles r on r.oid = am.roleid
            join pg_roles m on m.oid = am.member
           where r.rolname in ('anon','authenticated','service_role')
           order by 1, 2;
          SQL
