<!doctype html><html data-theme="light"><head><meta charset="utf-8"><title>Type — Norsk glyphs</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .card{padding:24px 28px;display:grid;grid-template-columns:1fr 1fr;gap:28px;}
  .col h5{font-family:var(--font-sans);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--text-muted);margin:0 0 10px 0;}
  .glyphs{font-family:var(--font-serif);font-weight:500;font-size:56px;color:var(--text);line-height:1.05;letter-spacing:-0.01em;}
  .glyphs-sans{font-family:var(--font-sans);font-weight:500;font-size:36px;color:var(--text);}
  .note{font-family:var(--font-sans);font-size:12px;color:var(--text-muted);margin-top:8px;}
</style></head><body>
<div class="card">
  <div class="col">
    <h5>Fraunces · serif</h5>
    <div class="glyphs">Tørny Æ&nbsp;Ø&nbsp;Å</div>
    <div class="note">Latin-Extended subset · ø/å/æ supported</div>
  </div>
  <div class="col">
    <h5>Inter · sans</h5>
    <div class="glyphs-sans">Tørny æ ø å</div>
    <div class="note">font-feature-settings: 'ss01','cv11'</div>
  </div>
</div>
</body></html>
