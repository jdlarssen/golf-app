<!doctype html><html data-theme="light"><head><meta charset="utf-8"><title>Brand mark</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#F8F6F0;font-family:Inter,system-ui,sans-serif;}
  .wrap{padding:24px 26px;display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center;}
  .mark{display:inline-flex;flex-direction:column;align-items:flex-start;gap:8px;line-height:1;}
  .word-row{display:inline-flex;align-items:baseline;font-family:Fraunces,serif;line-height:1;color:#1A2E1F;}
  .word{font-weight:500;font-size:40px;letter-spacing:-0.005em;}
  .dot{display:inline-block;width:5.6px;height:5.6px;border-radius:50%;background:#C9A961;margin-left:4px;transform:translateY(calc(-1ex - 5.6px));}
  .tagline{font-family:Inter,sans-serif;font-size:11px;font-weight:400;color:#5C5347;letter-spacing:0.005em;line-height:1.2;}
  .tagline .par{font-weight:600;color:#C9A961;}
  .dark{background:#0F1612;padding:18px;border-radius:14px;display:flex;align-items:center;justify-content:center;}
  .dark .word-row{color:#F0EDE5;}
  .dark .dot{background:#D4B870;}
  .dark .tagline{color:#A89F8E;}
  .dark .tagline .par{color:#D4B870;}
</style></head><body>
<div class="wrap">
  <div class="mark">
    <span class="word-row"><span class="word">Tørny</span><span class="dot"></span></span>
    <span class="tagline">Fyr opp golfturneringen på et <span class="par">par</span> minutter</span>
  </div>
  <div class="dark"><div class="mark">
    <span class="word-row"><span class="word">Tørny</span><span class="dot"></span></span>
    <span class="tagline">Fyr opp golfturneringen på et <span class="par">par</span> minutter</span>
  </div></div>
</div>
</body></html>
