<!doctype html><html data-theme="light"><head><meta charset="utf-8"><title>Colors — Primary</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .card{padding:22px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{height:64px;border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow-card);}
  .name{font-family:var(--font-sans);font-size:13px;font-weight:500;color:var(--text);}
  .hex{font-family:var(--font-sans);font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums;letter-spacing:.02em;}
  .role{font-family:var(--font-sans);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--text-muted);margin-bottom:2px;}
</style></head><body>
<div class="card">
  <div class="sw"><div class="role">Augusta forest · 1° actions</div><div class="chip" style="background:#1B4332"></div><div class="name">--primary</div><div class="hex">#1B4332</div></div>
  <div class="sw"><div class="role">Hover state</div><div class="chip" style="background:#2D5A40"></div><div class="name">--primary-hover</div><div class="hex">#2D5A40</div></div>
  <div class="sw"><div class="role">Soft wash · hover bg</div><div class="chip" style="background:#E8EFE8"></div><div class="name">--primary-soft</div><div class="hex">#E8EFE8</div></div>
</div>
</body></html>
