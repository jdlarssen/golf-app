<!doctype html><html data-theme="light"><head><meta charset="utf-8"><title>Score stepper</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .card{padding:22px 26px;display:flex;flex-direction:column;gap:14px;font-family:var(--font-sans);}
  .row{display:flex;align-items:center;gap:14px;padding:10px 14px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 2px rgba(26,46,31,0.04);}
  .who{flex:1;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;color:#1A2E1F;line-height:1.2;}
  .who .nick{color:var(--text-muted);font-style:italic;font-weight:400;font-size:13px;}
  .stepper{display:flex;align-items:center;gap:6px;}
  .btn{
    width:38px;height:46px;border-radius:11px;
    border:1px solid #DCD4C2;
    background:#F4EFE2;
    color:#1A2E1F;
    font-family:'Inter',sans-serif;font-size:18px;font-weight:500;line-height:1;
    cursor:pointer;
    box-shadow:inset 0 -1px 0 rgba(26,46,31,0.06);
  }
  .btn:hover{background:#ECE5D2;}
  .btn:active{box-shadow:inset 0 1px 0 rgba(26,46,31,0.08);}
  .input{
    width:62px;height:46px;
    border-radius:11px;
    border:1px solid #C9A961;
    background:#FFFFFF;
    text-align:center;
    font-family:'Fraunces',Georgia,serif;
    font-weight:600;
    font-size:24px;
    color:#1A2E1F;           /* deep forest — non-negotiable */
    font-variant-numeric:tabular-nums;
    font-feature-settings:'tnum' 1,'ss01' 1;
    box-shadow:0 0 0 3px rgba(201,169,97,0.12);
    outline:none;
    padding:0;
  }
  .input::placeholder{color:#C9C0AE;font-weight:500;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:8px;flex-shrink:0;}
  .syncword{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.14em;color:var(--text-muted);margin-left:4px;}
  .tag{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.18em;padding:2px 7px;border-radius:9999px;background:rgba(201,169,97,.12);color:#8C7235;border:1px solid rgba(201,169,97,.40);}
  .delta{font-size:11px;font-weight:500;font-family:Fraunces,serif;color:#4A7C59;margin-left:4px;font-variant-numeric:tabular-nums;}
  .delta.over{color:#8C7235;}
</style></head><body>
<div class="card">

  <div class="row">
    <span class="who">Sindre <span class="nick">«Slice»</span><span class="tag">+1 slag</span></span>
    <div class="stepper">
      <button class="btn">−</button>
      <input class="input" value="5">
      <button class="btn">+</button>
    </div>
    <span class="delta over">+1</span>
    <span class="dot" style="background:#4A7C59"></span>
    <span class="syncword" style="color:#4A7C59;">Lagret</span>
  </div>

  <div class="row">
    <span class="who">Kari <span class="nick">«Putter»</span></span>
    <div class="stepper">
      <button class="btn">−</button>
      <input class="input" value="4">
      <button class="btn">+</button>
    </div>
    <span class="delta">E</span>
    <span class="dot" style="background:#D89B3A"></span>
    <span class="syncword" style="color:#8C6A1F;">Synker…</span>
  </div>

  <div class="row">
    <span class="who">Ole</span>
    <div class="stepper">
      <button class="btn">−</button>
      <input class="input" value="" placeholder="—">
      <button class="btn">+</button>
    </div>
    <span class="dot" style="background:#E5E0D3"></span>
    <span class="syncword">Venter</span>
  </div>

</div>
</body></html>
