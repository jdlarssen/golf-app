<!doctype html><html data-theme="light"><head><meta charset="utf-8"><title>Toggle</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .wrap{padding:22px 28px;display:flex;flex-direction:column;gap:22px;font-family:var(--font-sans);}

  .row{display:flex;align-items:center;gap:18px;}

  /* segmented toggle — clubhouse style: warm-beige track, forest-fill active, champagne hairline */
  .seg{
    display:inline-flex;
    background:#ECE5D2;
    padding:3px;
    border-radius:9999px;
    box-shadow:inset 0 0 0 1px rgba(26,46,31,0.04);
  }
  .seg .tab{
    padding:7px 18px;
    font-size:12.5px;
    font-weight:500;
    letter-spacing:0.01em;
    color:#5C5347;
    border-radius:9999px;
    cursor:pointer;
    line-height:1;
    display:inline-flex;align-items:center;gap:6px;
    transition:color 120ms;
  }
  .seg .tab.on{
    background:#1B4332;
    color:#F8F6F0;
    box-shadow:
      inset 0 0 0 1px rgba(201,169,97,0.50),    /* champagne inner hairline */
      0 1px 2px rgba(26,46,31,0.18);
  }
  .seg .tab.on::before{
    content:'';
    width:4px;height:4px;border-radius:50%;
    background:#C9A961;
    box-shadow:0 0 0 1px rgba(255,255,255,0.15);
  }

  .meta{font-size:11px;color:var(--text-muted);}
  .meta b{color:var(--text);font-weight:500;}

  .kicker{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.20em;color:var(--text-muted);}

  /* dividers */
  .div-row{display:flex;align-items:center;gap:10px;width:100%;}
  .div-row .label{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.20em;}
  .div-line{flex:1;height:1px;}
  .div-line.beige{background:var(--border);}
  .div-line.champagne{background:linear-gradient(to right, rgba(201,169,97,0.50), rgba(201,169,97,0));}
  .div-line.forest{background:rgba(27,67,50,0.20);}

  .grid{display:grid;grid-template-columns:auto 1fr;column-gap:18px;row-gap:8px;align-items:center;}
</style></head><body>
<div class="wrap">

  <div class="grid">
    <div class="kicker">Segment</div>
    <div class="row">
      <div class="seg"><div class="tab on">Netto</div><div class="tab">Brutto</div></div>
      <span class="meta">Aktiv <b>Netto</b> · default i scorekort, leaderboard og hull-drilldown</span>
    </div>

    <div class="kicker">3-way</div>
    <div class="row">
      <div class="seg"><div class="tab on">I dag</div><div class="tab">Uka</div><div class="tab">Alle</div></div>
    </div>
  </div>

  <div style="height:1px;background:var(--border);"></div>

  <div class="kicker">Section dividers</div>

  <div class="div-row">
    <div class="label" style="color:#C9A961;">Sekretariatet</div>
    <div class="div-line champagne"></div>
  </div>

  <div class="div-row">
    <div class="label" style="color:var(--text-muted);">Aktive spill</div>
    <div class="div-line beige"></div>
  </div>

  <div class="div-row">
    <div class="label" style="color:#1B4332;">Mine resultater</div>
    <div class="div-line forest"></div>
  </div>

</div>
</body></html>
