<!doctype html><html data-theme="light"><head><meta charset="utf-8"><title>Type — Inter body</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .card{padding:18px 26px;display:flex;flex-direction:column;gap:8px;}
  .row{display:flex;align-items:baseline;gap:18px;}
  .label{flex:none;width:120px;font-family:var(--font-sans);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--text-muted);}
  .meta{margin-left:auto;font-family:var(--font-sans);font-size:11px;color:var(--text-muted);}
</style></head><body>
<div class="card">
  <div class="row"><span class="label">Body</span><span style="font-size:16px;font-weight:400;color:var(--text);">Klikk lenken vi sendte til e-posten din.</span><span class="meta">Inter 400 · 16px</span></div>
  <div class="row"><span class="label">Form label</span><span style="font-size:14px;font-weight:500;color:var(--text);">E-postadresse</span><span class="meta">Inter 500 · 14px</span></div>
  <div class="row"><span class="label">Helper</span><span style="font-size:12px;color:var(--text-muted);">Tallet du har i Golfbox akkurat nå</span><span class="meta">Inter 400 · 12px</span></div>
  <div class="row"><span class="label">Section</span><span class="section-label">Aktive spill</span><span class="meta">Inter 600 · 10px · 0.18em</span></div>
  <div class="row"><span class="label">Status pill</span><span class="pill tone-active">Pågående</span><span class="meta">Inter 500 · 10px · tracking-widest</span></div>
</div>
</body></html>
