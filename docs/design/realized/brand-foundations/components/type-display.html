<!doctype html><html data-theme="light"><head><meta charset="utf-8"><title>Type — Fraunces display</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .card{padding:20px 26px;}
  .specimen{font-family:var(--font-serif);font-weight:500;color:var(--text);line-height:1.05;letter-spacing:-0.01em;}
  .row{display:flex;align-items:baseline;gap:24px;border-bottom:1px solid var(--border);padding:10px 0;}
  .row:last-child{border:none;}
  .label{flex:none;width:120px;font-family:var(--font-sans);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--text-muted);}
  .meta{margin-left:auto;font-family:var(--font-sans);font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums;}
</style></head><body>
<div class="card">
  <div class="row"><span class="label">Display</span><span class="specimen" style="font-size:42px;">142</span><span class="meta">Fraunces 500 · 36–48px · tabular</span></div>
  <div class="row"><span class="label">H1</span><span class="specimen" style="font-size:30px;">Hei, Sindre</span><span class="meta">Fraunces 500 · 30px</span></div>
  <div class="row"><span class="label">H2</span><span class="specimen" style="font-size:24px;">Mitt scorekort</span><span class="meta">Fraunces 500 · 24px</span></div>
  <div class="row"><span class="label">Card title</span><span class="specimen" style="font-size:18px;">Stiklestad Open</span><span class="meta">Fraunces 500 · 18px</span></div>
</div>
</body></html>
