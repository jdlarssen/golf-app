<!doctype html><html data-theme="light"><head><meta charset="utf-8"><title>Colors — Dark mode</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#0F1612;color:#F0EDE5;font-family:Inter,system-ui,sans-serif;}
  .card{padding:22px 24px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:60px;border-radius:12px;border:1px solid #2D3F32;}
  .name{font-size:12px;font-weight:500;color:#F0EDE5;}
  .hex{font-size:10.5px;color:#A89F92;font-variant-numeric:tabular-nums;}
  .title{grid-column:1 / -1;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:#D4B870;margin-bottom:4px;}
</style></head><body>
<div class="card">
  <div class="title">[data-theme='dark']</div>
  <div class="sw"><div class="chip" style="background:#0F1612"></div><div class="name">bg</div><div class="hex">#0F1612</div></div>
  <div class="sw"><div class="chip" style="background:#1A2E1F"></div><div class="name">surface</div><div class="hex">#1A2E1F</div></div>
  <div class="sw"><div class="chip" style="background:#6B9F6F"></div><div class="name">primary</div><div class="hex">#6B9F6F</div></div>
  <div class="sw"><div class="chip" style="background:#D4B870"></div><div class="name">accent</div><div class="hex">#D4B870</div></div>
  <div class="sw"><div class="chip" style="background:#F0EDE5"></div><div class="name">text</div><div class="hex">#F0EDE5</div></div>
</div>
</body></html>
