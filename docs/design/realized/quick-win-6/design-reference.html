<!doctype html>
<html lang="nb">
<head>
<meta charset="utf-8">
<title>Tørny — Admin sekretariat</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,500;9..144,0,600;9..144,1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html{color-scheme:light;}
  html,body{margin:0;background:linear-gradient(180deg,#efe9d8,#e0d6bc);min-height:100vh;font-family:'Inter',system-ui,sans-serif;color:#1A2E1F;}
  body{padding:24px 12px 60px;display:flex;flex-direction:column;align-items:center;gap:18px;}
  .lede{max-width:520px;text-align:center;color:#5C5347;font-size:13px;line-height:1.5;}
  .switcher{display:inline-flex;gap:4px;padding:4px;background:rgba(255,255,255,0.6);border:1px solid #E5E0D3;border-radius:9999px;}
  .switcher button{padding:8px 16px;border:none;border-radius:9999px;background:transparent;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.04em;color:#5C5347;cursor:pointer;transition:all 160ms;}
  .switcher button.active{background:#1B4332;color:#F0EDE5;}
  .f-serif{font-family:'Fraunces',Georgia,serif;}
  .kicker{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.20em;text-transform:uppercase;color:#C9A961;}

  /* stagger fade in */
  @keyframes rowIn{0%{opacity:0;transform:translateY(4px)}100%{opacity:1;transform:translateY(0)}}
  .row-in{animation:rowIn 320ms cubic-bezier(.2,.7,.2,1) backwards;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
</head>
<body>

<div style="text-align:center;">
  <div class="f-serif" style="font-size:30px;font-weight:500;letter-spacing:-0.01em;">Admin · Sekretariatet</div>
  <p class="lede" style="margin-top:6px;">Klubbhus-følelse på admin. Bytt mellom flatene under.</p>
</div>

<div class="switcher" id="switcher"></div>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

// ─────────────────────────────────────────────────────────────
// Shared chrome — admin uses a slightly warmer bg + brass ribbon
// ─────────────────────────────────────────────────────────────
function SekretariatChrome({titleEl, leftAction, rightAction, ribbon, children}){
  return (
    <div className="torny-admin" style={{
      position:"absolute",inset:0,
      background:"#F5F1E4",  // slightly warmer than --bg (#F8F6F0)
      overflow:"hidden",display:"flex",flexDirection:"column",
      color:"#1A2E1F",paddingTop:54,paddingBottom:34,
      fontFamily:"'Inter',sans-serif",
    }}>
      {/* brass ribbon — paper-thin double-hairline below header */}
      <div style={{padding:"14px 18px 8px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,position:"relative"}}>
        <div style={{width:34,display:"flex",justifyContent:"flex-start"}}>{leftAction}</div>
        <div style={{flex:1,textAlign:"center"}}>{titleEl}</div>
        <div style={{width:34,display:"flex",justifyContent:"flex-end"}}>{rightAction}</div>
      </div>

      {/* "Brass ribbon" — section name in champagne with double-hairline bracket */}
      {ribbon ? (
        <div style={{padding:"4px 18px 14px",display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,height:6,position:"relative"}}>
            <div style={{position:"absolute",top:1,left:0,right:0,height:1,background:"#D3C9A6"}}></div>
            <div style={{position:"absolute",top:5,left:0,right:0,height:1,background:"#E5E0D3"}}></div>
          </div>
          <div className="kicker" style={{whiteSpace:"nowrap"}}>{ribbon}</div>
          <div style={{flex:1,height:6,position:"relative"}}>
            <div style={{position:"absolute",top:1,left:0,right:0,height:1,background:"#D3C9A6"}}></div>
            <div style={{position:"absolute",top:5,left:0,right:0,height:1,background:"#E5E0D3"}}></div>
          </div>
        </div>
      ) : null}

      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column"}}>{children}</div>
    </div>
  );
}

// Small decorative icons for the sekretariat entry
function MailIcon({size=22, color="#1B4332"}){
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden>
      <rect x="3" y="6" width="18" height="13" rx="1.5" stroke={color} strokeWidth="1.4"/>
      <path d="M3 7 L12 13 L21 7" stroke={color} strokeWidth="1.4" strokeLinejoin="round" fill="none"/>
    </svg>
  );
}
function CourseIcon({size=22, color="#1B4332"}){
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden>
      <line x1="6" y1="3" x2="6" y2="21" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
      <path d="M6 4 L17 6.5 L6 9 Z" fill="#C9A961" stroke="#C9A961" strokeWidth="1" strokeLinejoin="round"/>
      <ellipse cx="6" cy="21" rx="4.5" ry="1.2" stroke={color} strokeWidth="1.2" fill="none"/>
    </svg>
  );
}
function TrophyIcon({size=22, color="#1B4332"}){
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden>
      <path d="M7 4 H17 V9 a5 5 0 0 1 -10 0 V4 Z" stroke={color} strokeWidth="1.4" fill="none" strokeLinejoin="round"/>
      <path d="M7 6 H4 a2 2 0 0 0 2 4" stroke={color} strokeWidth="1.2" fill="none"/>
      <path d="M17 6 H20 a2 2 0 0 1 -2 4" stroke={color} strokeWidth="1.2" fill="none"/>
      <path d="M9 14 V17 H15 V14" stroke={color} strokeWidth="1.4" fill="none"/>
      <rect x="7" y="17" width="10" height="2.5" rx="0.5" stroke={color} strokeWidth="1.4" fill="#C9A961"/>
    </svg>
  );
}
function StampIcon({size=22, color="#1B4332"}){
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden>
      <circle cx="12" cy="9" r="6" stroke={color} strokeWidth="1.4" fill="none"/>
      <circle cx="12" cy="9" r="3" stroke={color} strokeWidth="1.2" fill="none"/>
      <path d="M4 19 H20" stroke={color} strokeWidth="1.6" strokeLinecap="round"/>
      <path d="M6 17 H18" stroke={color} strokeWidth="1.2" strokeLinecap="round"/>
    </svg>
  );
}

// ─────────────────────────────────────────────────────────────
// SCREEN 1 — Sekretariatet entry
// ─────────────────────────────────────────────────────────────
function SekretariatHome({onPick}){
  const today = "12. mai · uke 19";
  const sections = [
    {id:"spill",       label:"Spill",         meta:"3 aktive · 1 utkast",  icon:<TrophyIcon/>,   accent:true},
    {id:"invitasjoner",label:"Invitasjoner",  meta:"8 ventende svar",      icon:<MailIcon/>},
    {id:"baner",       label:"Baner",         meta:"12 registrerte",       icon:<CourseIcon/>},
    {id:"stempel",     label:"Resultatprotokoll", meta:"Sist signert lørdag", icon:<StampIcon/>},
  ];
  return (
    <SekretariatChrome
      titleEl={<div className="kicker" style={{color:"#5C5347"}}>Sekretariatet</div>}
      leftAction={<button style={{background:"none",border:"none",fontSize:18,color:"#1A2E1F",cursor:"pointer",padding:6,marginLeft:-6}} aria-label="Tilbake">‹</button>}
      rightAction={null}
    >
      {/* Salutation card */}
      <div style={{margin:"4px 14px 0",padding:"18px 20px",
        background:"linear-gradient(180deg,#FBF7E8 0%,#F5EFDE 100%)",
        border:"1px solid #E5DDC2",
        borderRadius:16,
        position:"relative",
      }}>
        <div className="kicker" style={{color:"#5C5347"}}>Saksbehandler</div>
        <div className="f-serif" style={{fontSize:22,fontWeight:500,letterSpacing:"-0.015em",marginTop:4}}>
          God ettermiddag, Sindre.
        </div>
        <div style={{fontSize:12,color:"#5C5347",marginTop:6,fontVariantNumeric:"tabular-nums"}}>{today}</div>

        {/* small "stempel" mark, top right */}
        <div style={{
          position:"absolute",top:14,right:14,
          width:54,height:54,borderRadius:"50%",
          border:"1.5px solid rgba(184,148,70,0.35)",
          display:"flex",alignItems:"center",justifyContent:"center",
          transform:"rotate(-8deg)",
          color:"rgba(184,148,70,0.55)",
          fontFamily:"'Fraunces',serif",fontWeight:500,
          fontSize:9,letterSpacing:"0.16em",textAlign:"center",lineHeight:1.15,
        }}>
          TØRNY<br/>·1862·
        </div>
      </div>

      {/* Section grid — tile look */}
      <div style={{padding:"14px 14px 8px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {sections.map((s,i)=>(
          <button key={s.id} onClick={()=>onPick(s.id)} className="row-in" style={{
            animationDelay:`${60+i*70}ms`,
            display:"flex",flexDirection:"column",alignItems:"flex-start",gap:0,
            padding:"14px 14px 12px",
            background:s.accent?"#1B4332":"#FFFFFF",
            color:s.accent?"#F0EDE5":"#1A2E1F",
            border:s.accent?"none":"1px solid #E5E0D3",
            borderRadius:14,
            boxShadow:s.accent?"0 4px 14px rgba(26,46,31,0.15)":"0 1px 2px rgba(26,46,31,0.03)",
            cursor:"pointer",textAlign:"left",fontFamily:"'Inter',sans-serif",
            minHeight:108,position:"relative",
          }}>
            <div style={{
              width:36,height:36,borderRadius:9,
              background:s.accent?"rgba(201,169,97,0.20)":"#F5F1E4",
              display:"flex",alignItems:"center",justifyContent:"center",
              marginBottom:10,
            }}>
              {React.cloneElement(s.icon, {color:s.accent?"#C9A961":"#1B4332"})}
            </div>
            <div className="f-serif" style={{fontSize:16,fontWeight:500,letterSpacing:"-0.005em"}}>{s.label}</div>
            <div style={{fontSize:11,marginTop:2,color:s.accent?"rgba(240,237,229,0.75)":"#5C5347",fontVariantNumeric:"tabular-nums"}}>{s.meta}</div>
          </button>
        ))}
      </div>

      {/* Ledger preview */}
      <div className="kicker" style={{color:"#5C5347",padding:"16px 18px 6px"}}>Siste hendelser</div>
      <div style={{margin:"0 14px",background:"#FFFFFF",border:"1px solid #E5E0D3",borderRadius:14,overflow:"hidden"}}>
        {[
          {t:"14:42", who:"E.Bråten", act:"signerte scorekort", ref:"Lørdagsslaget · runde 1"},
          {t:"14:28", who:"M.Berg",   act:"meldte seg på",     ref:"Klubbmesterskap 2026"},
          {t:"11:03", who:"Sindre",   act:"opprettet bane",    ref:"Asker Golfklubb (gjest)"},
          {t:"09:14", who:"K.Lund",   act:"avslo invitasjon",  ref:"Nattgolf · torsdag"},
        ].map((r,i)=>(
          <div key={i} className="row-in" style={{
            animationDelay:`${320+i*60}ms`,
            display:"grid",gridTemplateColumns:"42px 1fr",alignItems:"baseline",gap:10,
            padding:"10px 14px",
            borderTop:i===0?"none":"1px solid #E5E0D3",
          }}>
            <div className="f-serif" style={{fontSize:12,fontWeight:500,color:"#5C5347",fontVariantNumeric:"tabular-nums"}}>{r.t}</div>
            <div>
              <div style={{fontSize:13,color:"#1A2E1F"}}>
                <b style={{fontWeight:600}}>{r.who}</b> {r.act}
              </div>
              <div style={{fontSize:11,color:"#5C5347",marginTop:1,fontFamily:"'Fraunces',serif",fontStyle:"italic"}}>{r.ref}</div>
            </div>
          </div>
        ))}
      </div>

      <div style={{padding:"16px 24px 22px",textAlign:"center",fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:11,color:"#5C5347"}}>
        «Orden i protokollen.»
      </div>
    </SekretariatChrome>
  );
}

// ─────────────────────────────────────────────────────────────
// SCREEN 2 — Spill liste (ledger)
// ─────────────────────────────────────────────────────────────
function SpillListe({onBack, onPickSpill}){
  const spill = [
    {id:"lordags", name:"Lørdagsslaget", date:"12. mai",  status:"aktiv",   players:16, format:"Best ball netto"},
    {id:"klubbm",  name:"Klubbmesterskap 2026", date:"4.–6. juli", status:"påmelding", players:48, format:"Stableford"},
    {id:"natt",    name:"Nattgolf",     date:"23. mai",  status:"påmelding", players:12, format:"Texas scramble"},
    {id:"vinter",  name:"Vinterserien · 4",  date:"avsluttet", status:"signert", players:24, format:"Stableford"},
    {id:"utkast",  name:"Pinsegolfen",  date:"utkast",   status:"utkast",  players:0,  format:"—"},
  ];
  const statusChip = (s) => {
    const map = {
      aktiv:    {bg:"rgba(74,124,89,0.16)", fg:"#2F5A3C", label:"Aktiv"},
      påmelding:{bg:"rgba(216,155,58,0.18)",fg:"#7A5410", label:"Påmelding"},
      signert:  {bg:"rgba(92,83,71,0.10)",  fg:"#5C5347", label:"Signert"},
      utkast:   {bg:"rgba(184,70,62,0.12)", fg:"#7A3935", label:"Utkast"},
    };
    const c = map[s];
    return <span style={{
      display:"inline-block",fontSize:9.5,fontWeight:600,letterSpacing:"0.16em",textTransform:"uppercase",
      padding:"3px 7px",borderRadius:9999,background:c.bg,color:c.fg,
    }}>{c.label}</span>;
  };
  return (
    <SekretariatChrome
      titleEl={<div className="kicker" style={{color:"#5C5347"}}>Sekretariatet</div>}
      leftAction={<button onClick={onBack} aria-label="Tilbake" style={{background:"none",border:"none",fontSize:18,color:"#1A2E1F",cursor:"pointer",padding:6,marginLeft:-6}}>‹</button>}
      rightAction={
        <button style={{background:"rgba(229,224,211,0.5)",border:"1px solid #E5E0D3",borderRadius:9999,padding:"5px 10px",fontSize:10,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:"#1A2E1F",cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>+ Nytt</button>
      }
      ribbon="Spill · protokoll"
    >
      <div style={{padding:"2px 18px 0"}}>
        <h1 className="f-serif" style={{margin:"0 0 2px",fontSize:24,fontWeight:500,letterSpacing:"-0.015em"}}>Pågående og kommende</h1>
        <div style={{fontSize:11.5,color:"#5C5347"}}><span style={{fontVariantNumeric:"tabular-nums"}}>5</span> spill · sortert kronologisk</div>
      </div>

      {/* Ledger header */}
      <div style={{
        margin:"14px 14px 0",
        display:"grid",gridTemplateColumns:"1fr 84px 44px",alignItems:"center",gap:10,
        padding:"8px 14px",
        background:"#1B4332",color:"#F0EDE5",
        borderTopLeftRadius:12,borderTopRightRadius:12,
      }}>
        <div style={{fontSize:9.5,fontWeight:600,letterSpacing:"0.18em",textTransform:"uppercase",color:"#C9A961"}}>Spill</div>
        <div style={{fontSize:9.5,fontWeight:600,letterSpacing:"0.18em",textTransform:"uppercase",color:"#C9A961",textAlign:"right"}}>Status</div>
        <div></div>
      </div>

      <div style={{margin:"0 14px",background:"#FFFFFF",border:"1px solid #E5E0D3",borderTop:"none",borderBottomLeftRadius:14,borderBottomRightRadius:14,overflow:"hidden"}}>
        {spill.map((s,i)=>(
          <button key={s.id} onClick={()=>onPickSpill(s.id)} className="row-in" style={{
            animationDelay:`${60+i*60}ms`,
            display:"grid",gridTemplateColumns:"1fr 84px 14px",alignItems:"center",gap:10,
            padding:"14px 14px",
            background:"#FFFFFF",border:"none",borderTop:i===0?"none":"1px solid #E5E0D3",
            cursor:"pointer",textAlign:"left",fontFamily:"'Inter',sans-serif",color:"#1A2E1F",
            width:"100%",
          }}>
            <div>
              <div className="f-serif" style={{fontSize:16,fontWeight:500,letterSpacing:"-0.005em"}}>{s.name}</div>
              <div style={{fontSize:11.5,color:"#5C5347",marginTop:2,fontVariantNumeric:"tabular-nums"}}>{s.date} · {s.players}p · {s.format}</div>
            </div>
            <div style={{textAlign:"right"}}>{statusChip(s.status)}</div>
            <span style={{color:"#9A8F7C",fontSize:14}}>›</span>
          </button>
        ))}
      </div>

      <div style={{padding:"16px 24px 22px",textAlign:"center",fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:11,color:"#5C5347"}}>
        Tap et spill for å redigere protokollen.
      </div>
    </SekretariatChrome>
  );
}

// ─────────────────────────────────────────────────────────────
// SCREEN 3 — Spill detalj (single tournament admin)
// ─────────────────────────────────────────────────────────────
function SpillDetalj({onBack}){
  return (
    <SekretariatChrome
      titleEl={<div className="kicker" style={{color:"#5C5347"}}>Spill · protokoll</div>}
      leftAction={<button onClick={onBack} aria-label="Tilbake" style={{background:"none",border:"none",fontSize:18,color:"#1A2E1F",cursor:"pointer",padding:6,marginLeft:-6}}>‹</button>}
      rightAction={<button style={{background:"none",border:"none",fontSize:18,color:"#5C5347",cursor:"pointer",padding:6,marginRight:-6}} aria-label="Mer">⋯</button>}
    >
      {/* Title block */}
      <div style={{padding:"2px 18px 10px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <span style={{display:"inline-block",fontSize:9.5,fontWeight:600,letterSpacing:"0.18em",textTransform:"uppercase",color:"#2F5A3C",background:"rgba(74,124,89,0.16)",padding:"3px 7px",borderRadius:9999}}>Aktiv</span>
          <span style={{fontSize:11,color:"#5C5347",fontVariantNumeric:"tabular-nums"}}>Sak 2026-019</span>
        </div>
        <h1 className="f-serif" style={{margin:0,fontSize:26,fontWeight:500,letterSpacing:"-0.015em"}}>Lørdagsslaget</h1>
        <div style={{fontSize:12,color:"#5C5347",marginTop:4,fontVariantNumeric:"tabular-nums"}}>Asker Golfklubb · Best ball netto · 12. mai</div>
      </div>

      {/* Ledger card 1 — Påmelding */}
      <SectionCard ribbon="Påmelding">
        <Row label="Påmeldte"      value="16 / 16"   tone="full"/>
        <Row label="Bekreftet"     value="14"        sub="2 venter på svar"/>
        <Row label="Reserveliste"  value="3"         sub="første ut: A. Vik"/>
      </SectionCard>

      {/* Ledger card 2 — Format */}
      <SectionCard ribbon="Format">
        <Row label="Spillform"        value="Best ball netto"/>
        <Row label="Antall lag"       value="4"  sub="2 spillere per lag"/>
        <Row label="Handicap-justering" value="Full netto"/>
        <Row label="Cut-off"          value="Lør. 11:30" />
      </SectionCard>

      {/* Ledger card 3 — Banen */}
      <SectionCard ribbon="Banen">
        <Row label="Bane"        value="Asker GK"/>
        <Row label="Tee"         value="Gul"/>
        <Row label="Par · lengde" value="72 · 6 124 m"/>
        <Row label="CR / SR"     value="71.4 / 130"/>
      </SectionCard>

      {/* Action footer */}
      <div style={{padding:"8px 14px 0",display:"flex",gap:8}}>
        <button style={{flex:1,padding:"12px 14px",border:"1px solid #E5E0D3",borderRadius:12,background:"#FFFFFF",color:"#1A2E1F",fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:13,cursor:"pointer"}}>Rediger</button>
        <button style={{flex:1.4,padding:"12px 14px",border:"none",borderRadius:12,background:"#1B4332",color:"#F0EDE5",fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:13,cursor:"pointer"}}>Start runden</button>
      </div>

      <div style={{padding:"14px 24px 22px",textAlign:"center",fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:11,color:"#5C5347"}}>
        Sist signert av Sindre · i dag kl. 11:03
      </div>
    </SekretariatChrome>
  );
}

function SectionCard({ribbon, children}){
  return (
    <div style={{margin:"6px 14px 0"}}>
      {/* mini-ribbon */}
      <div style={{padding:"10px 4px 6px",display:"flex",alignItems:"center",gap:10}}>
        <div className="kicker" style={{whiteSpace:"nowrap",color:"#5C5347"}}>{ribbon}</div>
        <div style={{flex:1,height:1,background:"linear-gradient(90deg,#D3C9A6 0%, transparent 90%)"}}></div>
      </div>
      <div style={{background:"#FFFFFF",border:"1px solid #E5E0D3",borderRadius:12,boxShadow:"0 1px 2px rgba(26,46,31,0.03)",overflow:"hidden"}}>
        {children}
      </div>
    </div>
  );
}
function Row({label, value, sub, tone}){
  return (
    <div style={{
      display:"grid",gridTemplateColumns:"1fr auto",alignItems:"baseline",gap:14,
      padding:"11px 14px",
      borderTop:"1px solid #EDE6D2",
    }}>
      <div>
        <div style={{fontSize:12.5,color:"#1A2E1F",fontWeight:500}}>{label}</div>
        {sub ? <div style={{fontSize:11,color:"#5C5347",marginTop:2,fontFamily:"'Fraunces',serif",fontStyle:"italic"}}>{sub}</div> : null}
      </div>
      <div className="f-serif" style={{fontSize:15,fontWeight:500,letterSpacing:"-0.005em",fontVariantNumeric:"tabular-nums",color:tone==="full"?"#2F5A3C":"#1A2E1F",textAlign:"right"}}>{value}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App + switcher
// ─────────────────────────────────────────────────────────────
const VIEWS = [
  {id:"home", label:"Sekretariatet"},
  {id:"liste",label:"Spill · liste"},
  {id:"detalj",label:"Spill · detalj"},
];
function App(){
  const [view, setView] = useState("home");

  React.useEffect(()=>{
    const el = document.getElementById("switcher");
    el.innerHTML = "";
    VIEWS.forEach(v => {
      const b = document.createElement("button");
      b.textContent = v.label;
      if (v.id === view) b.className = "active";
      b.onclick = () => setView(v.id);
      el.appendChild(b);
    });
  },[view]);

  return (
    <IOSDevice>
      {view === "home" && <SekretariatHome onPick={(id)=>{ if(id==="spill") setView("liste"); }}/>}
      {view === "liste" && <SpillListe onBack={()=>setView("home")} onPickSpill={()=>setView("detalj")}/>}
      {view === "detalj" && <SpillDetalj onBack={()=>setView("liste")}/>}
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
