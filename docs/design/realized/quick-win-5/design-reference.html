<head>
<meta charset="utf-8">
<title>Tørny — Leaderboard pokal-moment</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
  html{color-scheme:light;}
  html,body{margin:0;background:linear-gradient(180deg,#efe9d8,#e0d6bc);min-height:100vh;font-family:'Inter',system-ui,sans-serif;color:#1A2E1F;}
  body{padding:24px 12px 60px;display:flex;flex-direction:column;align-items:center;gap:18px;}
  .lede{max-width:520px;text-align:center;color:#5C5347;font-size:13px;line-height:1.5;}
  .switcher{display:inline-flex;gap:4px;padding:4px;background:rgba(255,255,255,0.6);border:1px solid #E5E0D3;border-radius:9999px;}
  .switcher button{padding:8px 16px;border:none;border-radius:9999px;background:transparent;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.04em;color:#5C5347;cursor:pointer;transition:all 160ms;}
  .switcher button.active{background:#1B4332;color:#F0EDE5;}
  .f-serif{font-family:'Fraunces',Georgia,serif;}
  .kicker{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.20em;text-transform:uppercase;color:#C9A961;}

  /* Stagger fade-in */
  @keyframes rowIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
  .row-in{animation:rowIn 360ms cubic-bezier(.2,.7,.2,1) backwards;}

  /* Leader hairline shimmer (very subtle, one cycle) */
  @keyframes leaderShimmer{0%{box-shadow:inset 0 0 0 1px rgba(201,169,97,0.0),0 1px 2px rgba(26,46,31,0.04),0 4px 16px rgba(26,46,31,0.06)}50%{box-shadow:inset 0 0 0 1.5px rgba(201,169,97,0.95),0 1px 2px rgba(26,46,31,0.04),0 6px 20px rgba(201,169,97,0.18)}100%{box-shadow:inset 0 0 0 1px rgba(201,169,97,0.55),0 1px 2px rgba(26,46,31,0.04),0 4px 16px rgba(26,46,31,0.08)}}
  .leader-card{animation:leaderShimmer 1600ms ease-out 240ms both;}

  /* Confetti */
  @keyframes confetti{
    0%{transform:translate3d(0,0,0) rotate(0);opacity:0}
    8%{opacity:1}
    100%{transform:translate3d(var(--dx),var(--dy),0) rotate(var(--dr));opacity:0}
  }
  .confetti-piece{position:absolute;top:0;left:50%;width:5px;height:9px;border-radius:1px;animation:confetti var(--dur) cubic-bezier(.15,.55,.35,1) var(--delay) forwards;will-change:transform,opacity;pointer-events:none;}

  /* Slow champagne pulse on leader badge */
  @keyframes leaderBadgePulse{0%,100%{opacity:0.92}50%{opacity:1}}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>

<div style="text-align:center;">
  <div class="f-serif" style="font-size:30px;font-weight:500;letter-spacing:-0.01em;">Leaderboard · pokal-moment</div>
  <p class="lede" style="margin-top:6px;">Avsløringen av runden. Tap «Replay» for å se konfettien igjen, eller tap et lag for drilldown.</p>
</div>

<div class="switcher" id="switcher"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ─────────────────────────────────────────────────────────────
// Data
// ─────────────────────────────────────────────────────────────
const PARS = [4,4,3,5,4,4,3,5,4, 4,5,3,4,4,5,3,4,4]; // 18 holes, par 72
const HOLE_LENGTHS = [355,401,168,512,388,420,150,498,378, 362,488,178,395,408,505,165,398,370];

// 4 teams, best ball netto
// Each player has hcp (per-hole strokes given), each hole has gross score
const TEAMS = [
  {
    id:"eik", name:"Lag Eik", motto:"Gigantene",
    players:[
      {name:"Sindre Haugen", hcp:14, gross:[4,5,3,5,4,4,3,6,4, 4,5,3,4,4,5,3,4,4]},
      {name:"Erik Bråten",   hcp:8,  gross:[4,4,3,5,4,4,4,5,4, 4,5,3,4,4,5,3,4,4]},
    ],
  },
  {
    id:"furu", name:"Lag Furu", motto:"De stødige",
    players:[
      {name:"Andreas Vik",     hcp:22, gross:[5,5,4,6,4,5,4,6,5, 5,6,4,4,5,6,4,5,5]},
      {name:"Kristian Lund",   hcp:18, gross:[4,5,3,5,5,4,4,5,4, 5,5,4,5,5,5,3,4,5]},
    ],
  },
  {
    id:"bjork", name:"Lag Bjørk", motto:"Underdog",
    players:[
      {name:"Marius Berg",     hcp:11, gross:[4,4,3,5,4,5,3,6,4, 5,5,3,4,5,5,4,4,5]},
      {name:"Henrik Sørli",    hcp:16, gross:[5,5,4,5,4,4,4,5,5, 4,6,4,5,4,6,3,4,4]},
    ],
  },
  {
    id:"or", name:"Lag Or", motto:"Klubbveteranene",
    players:[
      {name:"Tom Eikrem",      hcp:20, gross:[5,5,4,6,5,5,4,6,5, 5,6,4,5,5,7,4,4,5]},
      {name:"Lars Brevik",     hcp:24, gross:[6,5,4,6,5,5,4,7,5, 5,7,4,5,5,6,4,5,5]},
    ],
  },
];

// Compute best-ball netto per hole per team, and team totals
function computeTeamData(team){
  // simple hcp distribution: stroke on holes by indices (we'll fake even distribution)
  const strokeIndex = [7,1,17,3,11,5,15,9,13, 8,2,18,4,12,6,16,10,14]; // 1..18
  // for each player, holes where they get a stroke = hcp count of lowest stroke indices
  const playerStrokes = team.players.map(p=>{
    const sortedIdx = strokeIndex.map((si,h)=>({si,h})).sort((a,b)=>a.si-b.si);
    const strokeHoles = new Set();
    let strokes = p.hcp;
    // full strokes on lowest indices
    for (let i=0; i<18 && strokes>0; i++){
      strokeHoles.add(sortedIdx[i].h);
      strokes--;
    }
    return strokeHoles;
  });
  // per hole, compute net for each player, then take min for team
  const netByHole = PARS.map((par,h)=>{
    const playerNets = team.players.map((p,pi)=>{
      const stroke = playerStrokes[pi].has(h) ? 1 : 0;
      return { gross: p.gross[h], net: p.gross[h] - stroke, stroke };
    });
    const teamNet = Math.min(...playerNets.map(x=>x.net));
    return { par, playerNets, teamNet, vs: teamNet - par };
  });
  const totalNet = netByHole.reduce((s,r)=>s+r.teamNet,0);
  const totalPar = PARS.reduce((a,b)=>a+b,0);
  const vsPar = totalNet - totalPar;
  return { ...team, netByHole, totalNet, vsPar };
}

const COMPUTED = TEAMS.map(computeTeamData);

// Rank by lowest totalNet
const RANKED = [...COMPUTED].sort((a,b)=>a.totalNet - b.totalNet);

// Compute hole-by-hole winners across all teams (for winner-merke)
const HOLE_WINNERS = PARS.map((_,h)=>{
  const scores = COMPUTED.map(t=>({id:t.id, net:t.netByHole[h].teamNet}));
  const min = Math.min(...scores.map(s=>s.net));
  const winners = scores.filter(s=>s.net===min).map(s=>s.id);
  return winners.length===1 ? winners[0] : null; // null = tied
});

// ─────────────────────────────────────────────────────────────
// Confetti burst (champagne + forest)
// ─────────────────────────────────────────────────────────────
function ConfettiBurst({trigger}){
  const pieces = useMemo(()=>{
    const colors = ["#C9A961","#D7BC78","#B89446","#1B4332","#2E5C42","#F0EDE5"];
    return Array.from({length:54}, (_,i)=>{
      const angle = (Math.random()-0.5) * Math.PI * 1.3; // -75°..+75°
      const speed = 90 + Math.random()*120;
      const dx = Math.sin(angle) * speed;
      const dy = 80 + Math.cos(angle) * speed * 0.6 + Math.random()*120;
      const dr = (Math.random()-0.5) * 720;
      const color = colors[Math.floor(Math.random()*colors.length)];
      const w = 3 + Math.random()*4;
      const h = 6 + Math.random()*8;
      return {
        dx:`${dx.toFixed(0)}px`, dy:`${dy.toFixed(0)}px`, dr:`${dr.toFixed(0)}deg`,
        color, w, h,
        dur: `${(900 + Math.random()*600).toFixed(0)}ms`,
        delay: `${(Math.random()*180).toFixed(0)}ms`,
      };
    });
  },[trigger]);

  return (
    <div key={trigger} style={{position:"absolute",top:0,left:0,right:0,height:0,pointerEvents:"none",zIndex:20,overflow:"visible"}}>
      {pieces.map((p,i)=>(
        <span key={i} className="confetti-piece" style={{
          "--dx":p.dx,"--dy":p.dy,"--dr":p.dr,"--dur":p.dur,"--delay":p.delay,
          background:p.color, width:p.w, height:p.h,
          marginLeft:-(p.w/2),
        }}/>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Custom decorative SVGs (forest + champagne)
// ─────────────────────────────────────────────────────────────
function LaurelLeft({h=120, color="#C9A961"}){
  return (
    <svg width={h*0.45} height={h} viewBox="0 0 54 120" fill="none" aria-hidden style={{display:"block"}}>
      <path d="M40 8 C20 30, 12 60, 14 110" stroke={color} strokeWidth="1.2" strokeLinecap="round"/>
      <g stroke={color} strokeWidth="1" fill="none" opacity="0.95">
        <path d="M36 18 C28 16, 22 22, 24 30"/>
        <path d="M30 32 C22 30, 16 36, 18 44"/>
        <path d="M24 48 C16 46, 12 54, 14 62"/>
        <path d="M20 66 C12 64, 10 72, 12 80"/>
        <path d="M16 84 C10 84, 10 92, 12 100"/>
      </g>
    </svg>
  );
}
function LaurelRight(props){
  return (
    <div style={{transform:"scaleX(-1)",display:"inline-block"}}>
      <LaurelLeft {...props}/>
    </div>
  );
}

function PinIcon({size=14, color="#C9A961"}){
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none" aria-hidden>
      <line x1="5" y1="1" x2="5" y2="15" stroke={color} strokeWidth="1.2" strokeLinecap="round"/>
      <path d="M5 2 L13 4 L5 6 Z" fill={color}/>
    </svg>
  );
}

// ─────────────────────────────────────────────────────────────
// Shared phone chrome
// ─────────────────────────────────────────────────────────────
function PhoneChrome({titleEl, leftAction, rightAction, children}){
  return (
    <div className="torny-light" style={{position:"absolute",inset:0,background:"#F8F6F0",overflow:"hidden",display:"flex",flexDirection:"column",color:"#1A2E1F",paddingTop:54,paddingBottom:34,fontFamily:"'Inter',sans-serif"}}>
      <div style={{padding:"14px 18px 8px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{width:34,display:"flex",justifyContent:"flex-start"}}>{leftAction}</div>
        <div style={{flex:1,textAlign:"center"}}>{titleEl}</div>
        <div style={{width:34,display:"flex",justifyContent:"flex-end"}}>{rightAction}</div>
      </div>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",position:"relative"}}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// LEADERBOARD VIEW
// ─────────────────────────────────────────────────────────────
function LeaderboardView({onPickTeam, replayKey, onReplay}){
  const leader = RANKED[0];
  const rest = RANKED.slice(1);

  const fmt = (v) => v===0 ? "E" : v>0 ? `+${v}` : `${v}`;

  return (
    <PhoneChrome
      titleEl={<div className="kicker" style={{color:"#5C5347"}}>Lørdagsslaget</div>}
      leftAction={<button style={{background:"none",border:"none",fontSize:18,color:"#1A2E1F",cursor:"pointer",padding:6,marginLeft:-6}} aria-label="Tilbake">‹</button>}
      rightAction={
        <button onClick={onReplay} title="Spill av konfetti igjen" style={{background:"rgba(229,224,211,0.5)",border:"1px solid #E5E0D3",borderRadius:9999,padding:"4px 9px",fontSize:10,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:"#5C5347",cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>
          Replay
        </button>
      }
    >
      {/* Title block */}
      <div style={{padding:"6px 24px 14px",textAlign:"center"}}>
        <div className="f-serif" style={{fontSize:28,fontWeight:500,letterSpacing:"-0.02em",lineHeight:1.1}}>Leaderboard</div>
        <div style={{marginTop:4,fontSize:11.5,color:"#5C5347",fontVariantNumeric:"tabular-nums"}}>Etter 18 hull · Best ball netto · Stableford</div>
      </div>

      {/* Leader card — extra dramatic */}
      <div style={{padding:"0 14px",position:"relative"}}>
        <ConfettiBurst trigger={replayKey}/>
        <div className="leader-card row-in" style={{
          position:"relative",
          background:"linear-gradient(180deg, #FFFFFF 0%, #FBF8EE 100%)",
          borderRadius:18,
          padding:"22px 22px 20px",
          marginBottom:12,
          animationDelay:"60ms",
        }}>
          {/* Laurels flanking the rank */}
          <div style={{position:"absolute",top:18,left:14,opacity:0.55}}><LaurelLeft h={68}/></div>
          <div style={{position:"absolute",top:18,right:14,opacity:0.55}}><LaurelRight h={68}/></div>

          {/* Centered crown + rank */}
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",position:"relative"}}>
            <div className="kicker" style={{animation:"leaderBadgePulse 3s ease-in-out infinite"}}>Leder · 1. plass</div>
            <div className="f-serif" style={{fontSize:64,fontWeight:600,letterSpacing:"-0.04em",lineHeight:1,color:"#C9A961",margin:"4px 0 4px",fontVariantNumeric:"tabular-nums",textShadow:"0 1px 0 rgba(184,148,70,0.3)"}}>1</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
              <PinIcon size={14} color="#C9A961"/>
              <h2 className="f-serif" style={{margin:0,fontSize:26,fontWeight:500,letterSpacing:"-0.015em",color:"#1A2E1F"}}>{leader.name}</h2>
              <PinIcon size={14} color="#C9A961"/>
            </div>
            <div style={{fontSize:12,color:"#5C5347",marginTop:2,fontStyle:"italic",fontFamily:"'Fraunces',serif"}}>«{leader.motto}»</div>
          </div>

          {/* Score row */}
          <div style={{
            marginTop:18,
            paddingTop:14,
            borderTop:"1px solid rgba(201,169,97,0.4)",
            display:"flex",justifyContent:"space-between",alignItems:"flex-end",
          }}>
            <div style={{textAlign:"left"}}>
              <div className="kicker" style={{color:"#5C5347"}}>Total netto</div>
              <div className="f-serif" style={{fontSize:34,fontWeight:600,letterSpacing:"-0.02em",lineHeight:1,fontVariantNumeric:"tabular-nums",marginTop:2}}>{leader.totalNet}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div className="kicker" style={{color:"#5C5347"}}>Mot par</div>
              <div className="f-serif" style={{fontSize:34,fontWeight:600,letterSpacing:"-0.02em",lineHeight:1,fontVariantNumeric:"tabular-nums",marginTop:2,color:leader.vsPar<0?"#2F5A3C":"#1A2E1F"}}>{fmt(leader.vsPar)}</div>
            </div>
          </div>

          {/* Players line */}
          <div style={{marginTop:14,fontSize:12,color:"#5C5347",textAlign:"center"}}>
            {leader.players.map(p=>p.name).join(" · ")}
          </div>

          {/* Hairline tap-affordance */}
          <button onClick={()=>onPickTeam(leader.id)} style={{position:"absolute",inset:0,background:"transparent",border:"none",cursor:"pointer",borderRadius:18}} aria-label="Vis drilldown for Lag Eik"></button>
        </div>
      </div>

      {/* Other teams */}
      <div style={{padding:"6px 14px 14px",display:"flex",flexDirection:"column",gap:8}}>
        {rest.map((t,i)=>{
          const rank = i+2;
          const gap = t.totalNet - leader.totalNet;
          return (
            <button key={t.id} onClick={()=>onPickTeam(t.id)} className="row-in" style={{
              animationDelay:`${140 + i*80}ms`,
              display:"flex",alignItems:"center",gap:14,
              padding:"14px 16px",
              background:"#FFFFFF",
              border:"1px solid #E5E0D3",
              borderRadius:14,
              boxShadow:"0 1px 2px rgba(26,46,31,0.04), 0 2px 6px rgba(26,46,31,0.03)",
              cursor:"pointer",
              textAlign:"left",
              fontFamily:"'Inter',sans-serif",
              color:"#1A2E1F",
            }}>
              <div className="f-serif" style={{width:24,textAlign:"center",fontSize:20,fontWeight:500,color:"#5C5347",fontVariantNumeric:"tabular-nums"}}>{rank}</div>
              <div style={{flex:1}}>
                <div className="f-serif" style={{fontSize:17,fontWeight:500,letterSpacing:"-0.005em"}}>{t.name}</div>
                <div style={{fontSize:11.5,color:"#5C5347",marginTop:2}}>{t.players.map(p=>p.name.split(" ")[0]).join(" · ")} · <span style={{fontVariantNumeric:"tabular-nums"}}>+{gap}</span> bak leder</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div className="f-serif" style={{fontSize:22,fontWeight:600,letterSpacing:"-0.02em",fontVariantNumeric:"tabular-nums",lineHeight:1}}>{t.totalNet}</div>
                <div style={{fontSize:10,color:"#5C5347",marginTop:3,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",fontVariantNumeric:"tabular-nums"}}>{fmt(t.vsPar)} <span style={{opacity:0.6}}>par</span></div>
              </div>
              <span style={{color:"#9A8F7C",fontSize:14}}>›</span>
            </button>
          );
        })}
      </div>

      {/* Footer caption */}
      <div style={{padding:"4px 24px 22px",textAlign:"center",fontSize:11,color:"#5C5347",fontFamily:"'Fraunces',serif",fontStyle:"italic"}}>
        Tap et lag for hull-for-hull
      </div>
    </PhoneChrome>
  );
}

// ─────────────────────────────────────────────────────────────
// DRILLDOWN VIEW
// ─────────────────────────────────────────────────────────────
function DrilldownView({teamId, onBack}){
  const team = COMPUTED.find(t=>t.id===teamId);
  const rank = RANKED.findIndex(t=>t.id===teamId) + 1;
  const fmt = (v) => v===0 ? "E" : v>0 ? `+${v}` : `${v}`;

  // Front/Back nine summaries
  const front = team.netByHole.slice(0,9).reduce((s,r)=>s+r.teamNet,0);
  const back  = team.netByHole.slice(9).reduce((s,r)=>s+r.teamNet,0);
  const frontPar = PARS.slice(0,9).reduce((a,b)=>a+b,0);
  const backPar  = PARS.slice(9).reduce((a,b)=>a+b,0);

  const renderHoles = (start, end) => team.netByHole.slice(start, end).map((row, ii)=>{
    const h = start + ii;
    const isWinner = HOLE_WINNERS[h] === team.id;
    const vsTone = row.vs < 0 ? "#2F5A3C" : row.vs === 0 ? "#1A2E1F" : row.vs === 1 ? "#7A5410" : "#7A2F2A";
    return (
      <div key={h} className="row-in" style={{
        animationDelay:`${40 + ii*22}ms`,
        display:"grid",
        gridTemplateColumns:"28px 30px 1fr auto 32px 14px",
        alignItems:"center",
        gap:10,
        padding:"10px 14px",
        background:"#FFFFFF",
        borderTop:"1px solid #E5E0D3",
        position:"relative",
      }}>
        {/* Hole number */}
        <div className="f-serif" style={{fontSize:15,fontWeight:500,color:"#1A2E1F",fontVariantNumeric:"tabular-nums",textAlign:"center"}}>{h+1}</div>
        {/* Par */}
        <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:"#5C5347",fontVariantNumeric:"tabular-nums"}}>P{row.par}</div>
        {/* Players grosses */}
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {row.playerNets.map((p,pi)=>{
            const isBest = p.net === row.teamNet;
            return (
              <span key={pi} style={{
                display:"inline-flex",alignItems:"center",gap:2,
                fontFamily:"'Fraunces',serif",fontSize:13,fontWeight:isBest?600:400,
                color:isBest?"#1A2E1F":"#9A8F7C",
                fontVariantNumeric:"tabular-nums",
                position:"relative",
              }}>
                {p.gross}
                {p.stroke ? <sup style={{fontSize:8,color:"#C9A961",fontWeight:600,marginLeft:1,fontFamily:"'Inter',sans-serif"}}>•</sup> : null}
                {pi < row.playerNets.length-1 && <span style={{color:"#D9D2C0",margin:"0 1px"}}>/</span>}
              </span>
            );
          })}
        </div>
        {/* Team net (big) */}
        <div className="f-serif" style={{fontSize:18,fontWeight:600,letterSpacing:"-0.015em",color:vsTone,fontVariantNumeric:"tabular-nums",textAlign:"right",minWidth:24}}>{row.teamNet}</div>
        {/* vs par mini pill */}
        <div style={{
          fontSize:10,fontWeight:600,fontVariantNumeric:"tabular-nums",
          padding:"2px 0",borderRadius:9999,textAlign:"center",
          background: row.vs<0 ? "rgba(74,124,89,0.16)" : row.vs===0 ? "rgba(92,83,71,0.10)" : row.vs===1 ? "rgba(216,155,58,0.18)" : "rgba(184,70,62,0.16)",
          color: vsTone,
        }}>{fmt(row.vs)}</div>
        {/* Winner mark */}
        <div style={{display:"flex",justifyContent:"center"}}>
          {isWinner ? (
            <span title="Vinner av hullet" style={{width:8,height:8,borderRadius:"50%",background:"#C9A961",boxShadow:"0 0 0 2px rgba(201,169,97,0.18)"}}></span>
          ) : null}
        </div>
      </div>
    );
  });

  return (
    <PhoneChrome
      titleEl={<div className="kicker" style={{color:"#5C5347"}}>{team.name} · {rank}. plass</div>}
      leftAction={
        <button onClick={onBack} aria-label="Tilbake" style={{background:"none",border:"none",fontSize:18,color:"#1A2E1F",cursor:"pointer",padding:6,marginLeft:-6}}>‹</button>
      }
      rightAction={null}
    >
      {/* Team hero (smaller than leader card) */}
      <div style={{padding:"6px 18px 14px",display:"flex",alignItems:"center",gap:14}}>
        <div className="f-serif" style={{fontSize:48,fontWeight:600,letterSpacing:"-0.04em",color:rank===1?"#C9A961":"#5C5347",fontVariantNumeric:"tabular-nums",lineHeight:1,minWidth:50,textAlign:"center"}}>{rank}</div>
        <div style={{flex:1}}>
          <h1 className="f-serif" style={{margin:0,fontSize:22,fontWeight:500,letterSpacing:"-0.015em"}}>{team.name}</h1>
          <div style={{fontSize:11.5,color:"#5C5347",marginTop:2}}>{team.players.map(p=>`${p.name.split(" ")[0]} (HCP ${p.hcp})`).join(" · ")}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div className="f-serif" style={{fontSize:24,fontWeight:600,letterSpacing:"-0.02em",fontVariantNumeric:"tabular-nums",lineHeight:1}}>{team.totalNet}</div>
          <div style={{fontSize:10,color:"#5C5347",marginTop:3,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",fontVariantNumeric:"tabular-nums"}}>{fmt(team.vsPar)} par</div>
        </div>
      </div>

      {/* Legend */}
      <div style={{padding:"0 18px 8px",display:"flex",alignItems:"center",gap:14,fontSize:10.5,color:"#5C5347"}}>
        <span style={{display:"inline-flex",alignItems:"center",gap:5}}><span style={{width:7,height:7,borderRadius:"50%",background:"#C9A961"}}></span>vinner av hullet</span>
        <span style={{display:"inline-flex",alignItems:"center",gap:3}}><sup style={{fontSize:8,color:"#C9A961",fontWeight:600,fontFamily:"'Inter',sans-serif"}}>•</sup>+slag</span>
        <span style={{marginLeft:"auto",fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:11}}>fet = brukt netto</span>
      </div>

      {/* Front nine */}
      <div className="kicker" style={{color:"#5C5347",padding:"6px 18px"}}>Ut · hull 1–9</div>
      <div style={{margin:"0 14px",background:"#FFFFFF",border:"1px solid #E5E0D3",borderRadius:14,boxShadow:"0 1px 2px rgba(26,46,31,0.03)",overflow:"hidden"}}>
        {renderHoles(0,9)}
        <div style={{display:"grid",gridTemplateColumns:"28px 30px 1fr auto 32px 14px",alignItems:"center",gap:10,padding:"10px 14px",borderTop:"1.5px solid #E5E0D3",background:"#F0EDE5"}}>
          <div className="f-serif" style={{fontSize:13,fontWeight:600,color:"#5C5347",letterSpacing:"0.04em",textAlign:"center"}}>UT</div>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:"#5C5347",fontVariantNumeric:"tabular-nums"}}>P{frontPar}</div>
          <div></div>
          <div className="f-serif" style={{fontSize:18,fontWeight:600,letterSpacing:"-0.015em",fontVariantNumeric:"tabular-nums",textAlign:"right"}}>{front}</div>
          <div style={{fontSize:10,fontWeight:600,fontVariantNumeric:"tabular-nums",textAlign:"center",color:"#5C5347"}}>{fmt(front-frontPar)}</div>
          <div></div>
        </div>
      </div>

      {/* Back nine */}
      <div className="kicker" style={{color:"#5C5347",padding:"18px 18px 6px"}}>Inn · hull 10–18</div>
      <div style={{margin:"0 14px",background:"#FFFFFF",border:"1px solid #E5E0D3",borderRadius:14,boxShadow:"0 1px 2px rgba(26,46,31,0.03)",overflow:"hidden"}}>
        {renderHoles(9,18)}
        <div style={{display:"grid",gridTemplateColumns:"28px 30px 1fr auto 32px 14px",alignItems:"center",gap:10,padding:"10px 14px",borderTop:"1.5px solid #E5E0D3",background:"#F0EDE5"}}>
          <div className="f-serif" style={{fontSize:13,fontWeight:600,color:"#5C5347",letterSpacing:"0.04em",textAlign:"center"}}>INN</div>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:"#5C5347",fontVariantNumeric:"tabular-nums"}}>P{backPar}</div>
          <div></div>
          <div className="f-serif" style={{fontSize:18,fontWeight:600,letterSpacing:"-0.015em",fontVariantNumeric:"tabular-nums",textAlign:"right"}}>{back}</div>
          <div style={{fontSize:10,fontWeight:600,fontVariantNumeric:"tabular-nums",textAlign:"center",color:"#5C5347"}}>{fmt(back-backPar)}</div>
          <div></div>
        </div>
      </div>

      {/* Total bar */}
      <div style={{margin:"18px 14px 8px",padding:"14px 18px",background:"#1B4332",color:"#F0EDE5",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div className="kicker" style={{color:"#C9A961"}}>Totalt</div>
          <div style={{fontSize:11.5,opacity:0.75,marginTop:2}}>{team.netByHole.filter((_,h)=>HOLE_WINNERS[h]===team.id).length} hull vunnet</div>
        </div>
        <div className="f-serif" style={{fontSize:32,fontWeight:600,letterSpacing:"-0.02em",fontVariantNumeric:"tabular-nums",lineHeight:1}}>{team.totalNet}</div>
      </div>

      <div style={{padding:"4px 24px 22px",textAlign:"center",fontSize:11,color:"#5C5347",fontFamily:"'Fraunces',serif",fontStyle:"italic"}}>
        «{team.motto}»
      </div>
    </PhoneChrome>
  );
}

// ─────────────────────────────────────────────────────────────
// App
// ─────────────────────────────────────────────────────────────
const VIEWS = [
  {id:"leaderboard", label:"Leaderboard"},
  {id:"drilldown",   label:"Drilldown (Lag Eik)"},
];

function App(){
  const [view, setView] = useState("leaderboard");
  const [teamId, setTeamId] = useState("eik");
  const [replayKey, setReplayKey] = useState(0);

  // Fire confetti once when entering leaderboard
  useEffect(()=>{
    if (view === "leaderboard") setReplayKey(k=>k+1);
  },[view]);

  React.useEffect(()=>{
    const el = document.getElementById("switcher");
    el.innerHTML = "";
    VIEWS.forEach(v => {
      const b = document.createElement("button");
      b.textContent = v.label;
      if (v.id === view) b.className = "active";
      b.onclick = () => {
        if (v.id === "drilldown") setTeamId("eik");
        setView(v.id);
      };
      el.appendChild(b);
    });
  },[view]);

  return (
    <IOSDevice>
      {view === "leaderboard"
        ? <LeaderboardView
            replayKey={replayKey}
            onReplay={()=>setReplayKey(k=>k+1)}
            onPickTeam={(id)=>{ setTeamId(id); setView("drilldown"); }}
          />
        : <DrilldownView teamId={teamId} onBack={()=>setView("leaderboard")}/>
      }
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
