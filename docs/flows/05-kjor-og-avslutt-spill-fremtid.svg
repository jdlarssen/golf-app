<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="1010" viewBox="0 0 1180 1010" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs><marker id="a" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8A6D27"/></marker></defs>
  <rect width="1180" height="1010" fill="#F8F6F0"/>
  <text x="120" y="58" font-family="Georgia, serif" font-size="32" font-weight="600" fill="#8A6D27">5 · Kjør og avslutt — slik blir det</text>
  <text x="121" y="88" font-size="15" fill="#6B7770">Samme flyt, men den kan aldri låse seg. Varsler går alltid i appen først — ingen unødvendig mail.</text>
  <g font-size="13">
    <rect x="118" y="104" width="34" height="20" rx="10" fill="#C9A961"/><text x="135" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">NY</text>
    <text x="160" y="119" fill="#6B7770">= endringen vi skal gjøre (med issue-nummer)</text>
  </g>

  <rect x="120" y="140" width="560" height="56" rx="16" fill="#E3EDE6" stroke="#2D6A4F" stroke-width="1.5"/>
  <text x="400" y="166" text-anchor="middle" font-size="15" font-weight="700" fill="#1B4332">Spillet er «Planlagt» (fra flyt 4)</text>
  <line x1="400" y1="196" x2="400" y2="220" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 1 start -->
  <rect x="120" y="222" width="560" height="58" rx="14" fill="#FFFFFF" stroke="#D8C089" stroke-width="1.5"/>
  <circle cx="156" cy="251" r="16" fill="#B8973F"/><text x="156" y="256" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">1</text>
  <text x="190" y="257" font-size="16" fill="#213029">Runden starter (auto ved tee-off / «Start nå»)</text>
  <line x1="400" y1="280" x2="400" y2="304" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 2 monitor -->
  <rect x="120" y="306" width="560" height="72" rx="14" fill="#FFFFFF" stroke="#D8C089" stroke-width="1.5"/>
  <circle cx="156" cy="342" r="16" fill="#B8973F"/><text x="156" y="347" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">2</text>
  <text x="190" y="338" font-size="16" fill="#213029">Følg med mens de spiller</text>
  <text x="190" y="360" font-size="12.5" fill="#6B7770">godkjenn, legg til etternølere, fiks feil</text>
  <line x1="400" y1="378" x2="400" y2="402" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 2.5 auto reminder (NY #376) -->
  <rect x="120" y="404" width="560" height="64" rx="14" fill="#FBF6EA" stroke="#C9A961" stroke-width="1.8"/>
  <rect x="610" y="412" width="44" height="20" rx="10" fill="#C9A961"/><text x="632" y="426" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">#376</text>
  <text x="156" y="443" font-size="19">🔔</text>
  <text x="190" y="432" font-size="14.5" font-weight="600" fill="#7A5E13">NY: auto-varsel når spilleren er ferdig (hull 18)</text>
  <text x="190" y="452" font-size="11.5" fill="#6B5526">«husk å levere» — automatisk · admin kan også purre i tillegg</text>
  <line x1="400" y1="468" x2="400" y2="492" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 3 end gate (NY #375) -->
  <rect x="120" y="494" width="560" height="80" rx="14" fill="#FBF6EA" stroke="#C9A961" stroke-width="1.8"/>
  <rect x="610" y="502" width="44" height="20" rx="10" fill="#C9A961"/><text x="632" y="516" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">#375</text>
  <text x="156" y="538" font-size="20">🏁</text>
  <text x="190" y="524" font-size="16" font-weight="600" fill="#7A5E13">«Avslutt spillet» — kan aldri låse seg</text>
  <text x="190" y="546" font-size="12.5" fill="#6B5526">mangler noen? «Avslutt likevel» viser hvem,</text>
  <text x="190" y="564" font-size="12.5" fill="#6B5526">de markeres «ikke fullført» — ingen no-show stopper deg</text>
  <line x1="400" y1="574" x2="400" y2="598" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 4 terminal (NY #377) -->
  <rect x="120" y="600" width="560" height="86" rx="16" fill="#F4EBD7" stroke="#C9A961" stroke-width="1.6"/>
  <rect x="610" y="608" width="44" height="20" rx="10" fill="#C9A961"/><text x="632" y="622" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">#377</text>
  <text x="400" y="636" text-anchor="middle" font-size="17" font-weight="700" fill="#8A6D27">✓  «Avsluttet» — resultatet er klart</text>
  <text x="400" y="659" text-anchor="middle" font-size="12.5" fill="#9C8552">leaderboard for alle · varsel i appen først til alle</text>
  <text x="400" y="677" text-anchor="middle" font-size="11.5" fill="#9C8552">mail kun til off-app · ingen egen avslutningsmail til alle</text>
  <line x1="400" y1="686" x2="400" y2="710" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 5 revansje (NY #1007) -->
  <rect x="120" y="712" width="560" height="80" rx="14" fill="#FBF6EA" stroke="#C9A961" stroke-width="1.8"/>
  <rect x="610" y="720" width="60" height="20" rx="10" fill="#C9A961"/><text x="640" y="734" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">#1007</text>
  <text x="156" y="748" font-size="19">🔁</text>
  <text x="190" y="738" font-size="15" font-weight="600" fill="#7A5E13">NY: «Revansje?» — alle deltakere, ikke bare arrangøren</text>
  <text x="190" y="758" font-size="12.5" fill="#6B5526">samme bane/format/sideturnering/spillerliste ferdig utfylt —</text>
  <text x="190" y="776" font-size="12.5" fill="#6B5526">skjult for cup-matches og liga-runder</text>
  <line x1="400" y1="792" x2="400" y2="816" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 6 back to flow 04 -->
  <rect x="120" y="818" width="560" height="52" rx="16" fill="#1B4332"/>
  <text x="400" y="850" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">→ Opprett spill (flyt 4), ferdig utfylt</text>

  <!-- right rail -->
  <rect x="760" y="222" width="320" height="326" rx="16" fill="#EDF5EF" stroke="#2D6A4F" stroke-width="1.3"/>
  <text x="920" y="252" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1B4332">Hva endret seg</text>
  <text x="782" y="284" font-size="13" fill="#46604F">✓ Avslutning kan aldri</text>
  <text x="782" y="303" font-size="13" fill="#46604F">  låses av en no-show (#375)</text>
  <text x="782" y="329" font-size="13" fill="#46604F">✓ Auto-purr når spilleren</text>
  <text x="782" y="348" font-size="13" fill="#46604F">  er ferdig (#376)</text>
  <text x="782" y="374" font-size="13" fill="#46604F">✓ Varsel i appen først;</text>
  <text x="782" y="393" font-size="13" fill="#46604F">  mail kun off-app (#377)</text>
  <text x="782" y="419" font-size="13" fill="#46604F">✓ «Revansje?» dupliserer</text>
  <text x="782" y="438" font-size="13" fill="#46604F">  spillet inn i opprett-</text>
  <text x="782" y="457" font-size="13" fill="#46604F">  veiviseren (#1007)</text>
  <text x="782" y="490" font-size="12" fill="#6B7770">Resten av flyten (start,</text>
  <text x="782" y="507" font-size="12" fill="#6B7770">godkjenn, gjenåpne) uendret.</text>
  <text x="782" y="530" font-size="12" fill="#6B7770">Epic: «Runden sår den neste»</text>
  <text x="782" y="547" font-size="12" fill="#6B7770">(#1006).</text>

  <!-- player parallel -->
  <text x="120" y="912" font-size="13.5" font-weight="700" fill="#1B4332">Hva spilleren opplever parallelt</text>
  <text x="120" y="938" font-size="13" fill="#46524B">Planlagt → «Du er påmeldt» · Pågående → taster slag, auto-purr når ferdig · Avsluttet → varsel + endelig leaderboard + «Revansje?».</text>

  <text x="120" y="985" font-size="12.5" fill="#9A937F">Kjernen: arrangøren mister aldri kontrollen over å få avsluttet — og runden sår den neste selv.</text>
</svg>
