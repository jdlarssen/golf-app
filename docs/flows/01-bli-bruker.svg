<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="910" viewBox="0 0 1120 910" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs><marker id="a" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#5E6B63"/></marker>
  <marker id="aL" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#C9A961"/></marker></defs>
  <rect width="1120" height="910" fill="#F8F6F0"/>
  <text x="120" y="60" font-family="Georgia, serif" font-size="32" font-weight="600" fill="#1B4332">1 · Bli bruker</text>
  <text x="121" y="90" font-size="15" fill="#6B7770">Fra invitasjon til klar konto. Uten denne kommer ingen i gang — dette er den aller første terskelen.</text>

  <!-- step pitch 104, x col 120 w600 center420; sidenotes x760 w320 -->
  <!-- 1 START -->
  <rect x="120" y="150" width="600" height="72" rx="16" fill="#1B4332"/>
  <text x="420" y="186" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">📨  Du får en invitasjon på mail</text>
  <text x="420" y="208" text-anchor="middle" font-size="12.5" fill="#C9A961">fra arrangøren — eller fra en venn</text>
  <line x1="420" y1="222" x2="420" y2="252" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 2 -->
  <rect x="120" y="254" width="600" height="72" rx="14" fill="#FFFFFF" stroke="#9DBFAC" stroke-width="1.5"/>
  <circle cx="156" cy="290" r="16" fill="#2D6A4F"/><text x="156" y="295" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">1</text>
  <text x="190" y="286" font-size="16" fill="#213029">Trykk lenken og skriv e-posten din</text>
  <text x="190" y="308" font-size="12.5" fill="#6B7770">bak kulissene: appen sjekker at e-posten er invitert</text>
  <line x1="420" y1="326" x2="420" y2="356" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- gate -->
  <rect x="120" y="358" width="600" height="72" rx="14" fill="#FBF3DF" stroke="#C9A961" stroke-width="1.5"/>
  <text x="156" y="402" font-size="20">🔎</text>
  <text x="190" y="390" font-size="16" font-weight="600" fill="#7A5E13">Sjekk: er e-posten invitert?</text>
  <text x="190" y="412" font-size="12.5" fill="#8A7333">ja → koden sendes · nei → ingen kode</text>
  <!-- side note -->
  <rect x="760" y="358" width="320" height="72" rx="14" fill="#FFF7F4" stroke="#E0B4A6" stroke-width="1.3"/>
  <text x="780" y="388" font-size="13.5" font-weight="600" fill="#9A4A2F">Ikke invitert → kryptisk feil i dag</text>
  <text x="780" y="410" font-size="12.5" fill="#9A6B5A">bør bli vennlig melding ⚠ #361</text>
  <line x1="720" y1="394" x2="756" y2="394" stroke="#C9A961" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aL)"/>
  <line x1="420" y1="430" x2="420" y2="460" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 3 -->
  <rect x="120" y="462" width="600" height="72" rx="14" fill="#FFFFFF" stroke="#9DBFAC" stroke-width="1.5"/>
  <circle cx="156" cy="498" r="16" fill="#2D6A4F"/><text x="156" y="503" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">2</text>
  <text x="190" y="494" font-size="16" fill="#213029">Skriv engangskoden du får på mail</text>
  <text x="190" y="516" font-size="12.5" fill="#6B7770">6–8 sifre, ingen passord å huske ⚠ #318</text>
  <line x1="420" y1="534" x2="420" y2="564" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 4 -->
  <rect x="120" y="566" width="600" height="72" rx="14" fill="#FFFFFF" stroke="#9DBFAC" stroke-width="1.5"/>
  <circle cx="156" cy="602" r="16" fill="#2D6A4F"/><text x="156" y="607" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">3</text>
  <text x="190" y="598" font-size="16" fill="#213029">Du er logget inn</text>
  <text x="190" y="620" font-size="12.5" fill="#6B7770">blir automatisk meldt på spillet du ble invitert til</text>
  <line x1="420" y1="638" x2="420" y2="668" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 5 -->
  <rect x="120" y="670" width="600" height="72" rx="14" fill="#FFFFFF" stroke="#9DBFAC" stroke-width="1.5"/>
  <circle cx="156" cy="706" r="16" fill="#2D6A4F"/><text x="156" y="711" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">4</text>
  <text x="190" y="702" font-size="16" fill="#213029">Fyll inn navn og handicap</text>
  <text x="190" y="724" font-size="12.5" fill="#6B7770">engangs — fullfører profilen din</text>
  <line x1="420" y1="742" x2="420" y2="772" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 6 TERMINAL -->
  <rect x="120" y="774" width="600" height="78" rx="16" fill="#F4EBD7" stroke="#C9A961" stroke-width="1.6"/>
  <text x="420" y="806" text-anchor="middle" font-size="17" font-weight="700" fill="#8A6D27">✓  Klar — du lander på Hjem</text>
  <text x="420" y="830" text-anchor="middle" font-size="12.5" fill="#9C8552">⚠ #356: burde sende deg rett til spillet ditt</text>

  <text x="120" y="888" font-size="12.5" fill="#9A937F">⚠ = kjent forbedringspunkt sporet som GitHub-issue</text>
</svg>
