<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="1000" viewBox="0 0 1180 1000" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#5E6B63"/></marker>
    <marker id="aL" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7FA98E"/></marker>
  </defs>
  <rect width="1180" height="1000" fill="#F8F6F0"/>
  <text x="120" y="58" font-family="Georgia, serif" font-size="32" font-weight="600" fill="#1B4332">3 · Spille en runde — slik blir det</text>
  <text x="121" y="88" font-size="15" fill="#6B7770">Denne flyten var nesten i mål alt. Det meste fungerer; bare én ekte forbedring (#360).</text>
  <g font-size="13">
    <rect x="118" y="104" width="34" height="20" rx="10" fill="#2D6A4F"/><text x="135" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">✓</text>
    <text x="160" y="119" fill="#6B7770">fungerer alt i dag</text>
    <rect x="330" y="104" width="34" height="20" rx="10" fill="#C9A961"/><text x="347" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">NY</text>
    <text x="372" y="119" fill="#6B7770">endringen vi skal gjøre</text>
  </g>

  <!-- start -->
  <rect x="120" y="146" width="560" height="64" rx="16" fill="#1B4332"/>
  <text x="400" y="178" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">⛳  Runden har startet</text>
  <text x="400" y="198" text-anchor="middle" font-size="12" fill="#C9A961">starter automatisk ved tee-off</text>
  <line x1="400" y1="210" x2="400" y2="236" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 1 -->
  <rect x="120" y="238" width="560" height="60" rx="14" fill="#FFFFFF" stroke="#9DBFAC" stroke-width="1.5"/>
  <circle cx="156" cy="268" r="16" fill="#2D6A4F"/><text x="156" y="273" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">1</text>
  <text x="190" y="274" font-size="16" fill="#213029">Åpne spillet → «Start runden»</text>
  <line x1="400" y1="298" x2="400" y2="324" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 2 loop -->
  <rect x="120" y="326" width="560" height="92" rx="14" fill="#EAF3EE" stroke="#2D6A4F" stroke-width="1.6"/>
  <circle cx="156" cy="372" r="16" fill="#2D6A4F"/><text x="156" y="377" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">2</text>
  <text x="190" y="360" font-size="16" font-weight="600" fill="#1B4332">Tast slag → neste hull (×18)</text>
  <text x="190" y="382" font-size="12.5" fill="#46604F">«Fortsett runden» tar deg tilbake der du slapp</text>
  <text x="190" y="403" font-size="12.5" fill="#46604F">🔁 ett tapp per spiller</text>
  <path d="M120,392 C92,392 92,352 118,352" fill="none" stroke="#2D6A4F" stroke-width="1.5" marker-end="url(#aL)"/>

  <!-- offline rail (all green now) -->
  <rect x="740" y="326" width="340" height="160" rx="16" fill="#EDF5EF" stroke="#2D6A4F" stroke-width="1.4"/>
  <text x="762" y="356" font-size="14.5" font-weight="700" fill="#1B4332">⚙ Bak kulissene — alt på plass</text>
  <text x="762" y="382" font-size="12.5" fill="#2D6A4F">✓ Slag lagres på telefonen først</text>
  <text x="762" y="404" font-size="12.5" fill="#2D6A4F">✓ Synker av seg selv når online</text>
  <text x="762" y="426" font-size="12.5" fill="#2D6A4F">✓ «Lagret · 14:32»-merke per slag</text>
  <text x="762" y="448" font-size="12.5" fill="#2D6A4F">✓ Banner hvis noe henger/feiler</text>
  <text x="762" y="470" font-size="12.5" fill="#2D6A4F">✓ Flighten ser hverandre live</text>
  <line x1="680" y1="372" x2="736" y2="390" stroke="#7FA98E" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aL)"/>
  <line x1="400" y1="418" x2="400" y2="444" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 3 -->
  <rect x="120" y="446" width="560" height="58" rx="14" fill="#FFFFFF" stroke="#9DBFAC" stroke-width="1.5"/>
  <circle cx="156" cy="475" r="16" fill="#2D6A4F"/><text x="156" y="480" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">3</text>
  <text x="190" y="481" font-size="16" fill="#213029">Gjennomgå scorekortet</text>
  <line x1="400" y1="504" x2="400" y2="530" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 4 -->
  <rect x="120" y="532" width="560" height="58" rx="14" fill="#FFFFFF" stroke="#9DBFAC" stroke-width="1.5"/>
  <circle cx="156" cy="561" r="16" fill="#2D6A4F"/><text x="156" y="566" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">4</text>
  <text x="190" y="567" font-size="16" fill="#213029">«Lever scorekort»</text>
  <line x1="400" y1="590" x2="400" y2="616" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 5 approval (NY #360) -->
  <rect x="120" y="618" width="560" height="92" rx="14" fill="#FBF6EA" stroke="#C9A961" stroke-width="1.8"/>
  <rect x="610" y="628" width="44" height="20" rx="10" fill="#C9A961"/><text x="632" y="642" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">#360</text>
  <text x="156" y="664" font-size="20">🤝</text>
  <text x="190" y="652" font-size="15" font-weight="600" fill="#7A5E13">Evt: en i flighten godkjenner</text>
  <text x="190" y="674" font-size="12.5" fill="#6B5526">kun hvis arrangøren krever det</text>
  <text x="190" y="695" font-size="12.5" fill="#6B5526">NY: kan ikke låse seg — admin ser + kan løse opp, auto-eskalering ved timeout</text>
  <line x1="400" y1="710" x2="400" y2="736" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- 6 terminal -->
  <rect x="120" y="738" width="560" height="74" rx="16" fill="#F4EBD7" stroke="#C9A961" stroke-width="1.6"/>
  <text x="400" y="770" text-anchor="middle" font-size="17" font-weight="700" fill="#8A6D27">🏆  Se leaderboard</text>
  <text x="400" y="794" text-anchor="middle" font-size="12.5" fill="#9C8552">✓ oppdaterer seg selv live underveis</text>

  <!-- footnote -->
  <rect x="740" y="618" width="340" height="120" rx="16" fill="#FFFFFF" stroke="#D8D2C4" stroke-width="1.3"/>
  <text x="762" y="648" font-size="14" font-weight="700" fill="#1B4332">Hva som endret seg</text>
  <text x="762" y="674" font-size="12.5" fill="#46524B">Egentlig bare peer-godkjenning:</text>
  <text x="762" y="695" font-size="12.5" fill="#46524B">den kan ikke lenger henge fast.</text>
  <text x="762" y="717" font-size="12.5" fill="#6B7770">#358 + #359 var alt løst — lukket</text>
  <text x="762" y="734" font-size="12.5" fill="#6B7770">som «allerede ferdig».</text>

  <text x="120" y="864" font-size="12.5" fill="#9A937F">Lærdom: auditen overdrev. Verifisering mot koden viste at 2 av 3 «funn» alt var på plass.</text>
</svg>
