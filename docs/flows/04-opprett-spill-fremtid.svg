<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1000" viewBox="0 0 1200 1000" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs><marker id="a" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8A6D27"/></marker></defs>
  <rect width="1200" height="1000" fill="#F8F6F0"/>
  <text x="120" y="58" font-family="Georgia, serif" font-size="32" font-weight="600" fill="#8A6D27">4 · Opprett spill — slik blir det</text>
  <text x="121" y="88" font-size="15" fill="#6B7770">Kompis-runden settes opp raskt: antall først, så bare formatene som faktisk passer gjengen.</text>
  <g font-size="13">
    <rect x="118" y="104" width="34" height="20" rx="10" fill="#C9A961"/><text x="135" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">NY</text>
    <text x="160" y="119" fill="#6B7770">= endringen vi skal gjøre (med issue-nummer)</text>
  </g>

  <!-- start -->
  <rect x="450" y="136" width="320" height="50" rx="16" fill="#1B4332"/>
  <text x="610" y="167" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">«+ Opprett spill»</text>
  <line x1="610" y1="186" x2="610" y2="202" stroke="#8A6D27" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- step 1 -->
  <g>
    <rect x="290" y="204" width="640" height="42" rx="13" fill="#FFFFFF" stroke="#D8C089" stroke-width="1.5"/>
    <circle cx="328" cy="225" r="15" fill="#B8973F"/><text x="328" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
    <text x="360" y="230" font-size="15" fill="#213029">Arrangement — Kompis · Klubb · Cup · Solo</text>
  </g>
  <line x1="610" y1="246" x2="610" y2="258" stroke="#8A6D27" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- NEW count step (#373) -->
  <g>
    <rect x="290" y="260" width="640" height="48" rx="13" fill="#FBF6EA" stroke="#C9A961" stroke-width="1.8"/>
    <rect x="866" y="266" width="44" height="20" rx="10" fill="#C9A961"/><text x="888" y="280" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">#373</text>
    <text x="310" y="291" font-size="19">👥</text>
    <text x="342" y="282" font-size="14.5" font-weight="600" fill="#7A5E13">NY (Kompis): «Hvor mange er dere?»</text>
    <text x="342" y="299" font-size="11.5" fill="#6B5526">ett tall → filtrerer formatene i neste steg</text>
  </g>
  <line x1="610" y1="308" x2="610" y2="320" stroke="#8A6D27" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- step 2 format (filtered) -->
  <g>
    <rect x="290" y="322" width="640" height="48" rx="13" fill="#FBF6EA" stroke="#C9A961" stroke-width="1.8"/>
    <rect x="866" y="326" width="44" height="20" rx="10" fill="#C9A961"/><text x="888" y="340" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">#373</text>
    <circle cx="328" cy="346" r="15" fill="#B8973F"/><text x="328" y="351" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
    <text x="360" y="344" font-size="15" fill="#213029">Format — kun de som passer antallet</text>
    <text x="360" y="361" font-size="11.5" fill="#6B5526">resten skjult → umulig å velge feil</text>
  </g>
  <line x1="610" y1="370" x2="610" y2="382" stroke="#8A6D27" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- step 3 -->
  <g>
    <rect x="290" y="384" width="640" height="42" rx="13" fill="#FFFFFF" stroke="#D8C089" stroke-width="1.5"/>
    <circle cx="328" cy="405" r="15" fill="#B8973F"/><text x="328" y="410" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
    <text x="360" y="410" font-size="15" fill="#213029">Bane og tidspunkt</text>
  </g>
  <line x1="610" y1="426" x2="610" y2="438" stroke="#8A6D27" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- step 4 -->
  <g>
    <rect x="290" y="440" width="640" height="42" rx="13" fill="#FFFFFF" stroke="#D8C089" stroke-width="1.5"/>
    <circle cx="328" cy="461" r="15" fill="#B8973F"/><text x="328" y="466" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">4</text>
    <text x="360" y="466" font-size="15" fill="#213029">Spillere (forhåndsfylt fra antallet)</text>
  </g>
  <line x1="610" y1="482" x2="610" y2="494" stroke="#8A6D27" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- step 5 ready (changed) -->
  <rect x="290" y="496" width="640" height="110" rx="13" fill="#FBF6EA" stroke="#C9A961" stroke-width="1.8"/>
  <circle cx="328" cy="527" r="16" fill="#B8973F"/><text x="328" y="532" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">5</text>
  <text x="362" y="523" font-size="15.5" font-weight="600" fill="#213029">Klar? — oppsummering + valg</text>
  <text x="362" y="545" font-size="12.5" fill="#6B5526">✓ Peer-godkjenning nå AV som standard (#371) — ingen låse-risiko</text>
  <text x="362" y="565" font-size="12.5" fill="#6B5526">✓ Påmeldingsvalg i klartekst (#367), uten kode-kruskel (#372)</text>
  <text x="362" y="585" font-size="12" fill="#8A7333">standard «kun invitasjon» (privat) beholdt · alt kan overstyres her</text>
  <line x1="610" y1="606" x2="610" y2="622" stroke="#8A6D27" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- fork -->
  <rect x="320" y="624" width="270" height="50" rx="14" fill="#ECEAE3" stroke="#B9B3A7" stroke-width="1.4"/>
  <text x="455" y="647" text-anchor="middle" font-size="14" font-weight="600" fill="#6B6258">Lagre som utkast</text>
  <text x="455" y="665" text-anchor="middle" font-size="11.5" fill="#857C70">skjult, ikke sendt</text>
  <rect x="630" y="624" width="270" height="50" rx="14" fill="#F4EBD7" stroke="#C9A961" stroke-width="1.6"/>
  <text x="765" y="647" text-anchor="middle" font-size="14" font-weight="700" fill="#8A6D27">Publiser &amp; inviter</text>
  <text x="765" y="665" text-anchor="middle" font-size="11.5" fill="#9C8552">spillerne får beskjed</text>
  <line x1="765" y1="674" x2="765" y2="690" stroke="#8A6D27" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- terminal -->
  <rect x="565" y="692" width="400" height="66" rx="16" fill="#E3EDE6" stroke="#2D6A4F" stroke-width="1.6"/>
  <text x="765" y="720" text-anchor="middle" font-size="16" font-weight="700" fill="#1B4332">✓  Spillet er «Planlagt»</text>
  <text x="765" y="743" text-anchor="middle" font-size="12" fill="#46604F">spillerne kan bli med — se flyt 2</text>

  <!-- left: the win -->
  <rect x="70" y="260" width="200" height="110" rx="14" fill="#EDF5EF" stroke="#2D6A4F" stroke-width="1.3"/>
  <text x="90" y="286" font-size="13" font-weight="700" fill="#1B4332">Kjernen i fiksen</text>
  <text x="90" y="309" font-size="11.5" fill="#46604F">Antall først betyr at</text>
  <text x="90" y="326" font-size="11.5" fill="#46604F">du aldri velger et</text>
  <text x="90" y="343" font-size="11.5" fill="#46604F">format som ikke passer</text>
  <text x="90" y="360" font-size="11.5" fill="#46604F">— null frem-og-tilbake.</text>

  <!-- left lower: bigger later -->
  <rect x="70" y="496" width="200" height="110" rx="14" fill="#F1EEE6" stroke="#C9C2B2" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="90" y="522" font-size="13" font-weight="700" fill="#6B6258">Større, senere</text>
  <text x="90" y="545" font-size="11.5" fill="#857C70">#22 alle kan opprette</text>
  <text x="90" y="562" font-size="11.5" fill="#857C70">spill (RLS-jobb)</text>
  <text x="90" y="584" font-size="11.5" fill="#857C70">#366 bruker-baner,</text>
  <text x="90" y="601" font-size="11.5" fill="#857C70">avhenger av #22</text>

  <text x="120" y="812" font-size="12.5" fill="#9A937F">Hele poenget: en kompis-runde skal settes opp på et par minutter — antall-først fjerner den vanligste snublesteinen.</text>
  <text x="120" y="836" font-size="12.5" fill="#9A937F">Endringene er fokuserte (antall-steg + filtrert grid + tryggere defaults), ikke en ombygging av wizarden.</text>
</svg>
