<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1060" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#5E6B63"/></marker>
    <marker id="arrL" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#A9A395"/></marker>
  </defs>

  <rect x="0" y="0" width="1440" height="1060" fill="#F8F6F0"/>

  <!-- Header -->
  <text x="60" y="62" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="600" fill="#1B4332">Tørny — brukerflyt</text>
  <text x="61" y="90" font-size="16" fill="#6B7770">Fra innlogging til ferdig runde. Felles inngang øverst, så to spor: spiller og arrangør.</text>

  <!-- Legend -->
  <g font-size="13" fill="#46524B">
    <rect x="1086" y="40" width="14" height="14" rx="3" fill="#1B4332"/><text x="1106" y="52">Felles</text>
    <rect x="1170" y="40" width="14" height="14" rx="3" fill="#E3EDE6" stroke="#2D6A4F"/><text x="1190" y="52">Spiller</text>
    <rect x="1262" y="40" width="14" height="14" rx="3" fill="#F4EBD7" stroke="#C9A961"/><text x="1282" y="52">Arrangør</text>
  </g>

  <!-- ===== FELLES INNGANG ===== -->
  <text x="60" y="138" font-size="13" font-weight="700" letter-spacing="2" fill="#B8973F">FELLES INNGANG</text>

  <!-- E1 E2 E3 -->
  <g>
    <rect x="140" y="150" width="360" height="58" rx="14" fill="#FFFFFF" stroke="#C9B79A" stroke-width="1.5"/>
    <text x="320" y="185" text-anchor="middle" font-size="15" fill="#213029">📨  Invitasjon eller lenke (på mail)</text>
  </g>
  <g>
    <rect x="540" y="150" width="360" height="58" rx="14" fill="#FFFFFF" stroke="#C9B79A" stroke-width="1.5"/>
    <text x="720" y="185" text-anchor="middle" font-size="15" fill="#213029">🔑  Logg inn med engangskode</text>
  </g>
  <g>
    <rect x="940" y="150" width="360" height="58" rx="14" fill="#FFFFFF" stroke="#C9B79A" stroke-width="1.5"/>
    <text x="1120" y="185" text-anchor="middle" font-size="15" fill="#213029">👤  Fullfør profil (navn, handicap)</text>
  </g>
  <line x1="500" y1="179" x2="536" y2="179" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="900" y1="179" x2="936" y2="179" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- E4 Hjem pivot -->
  <path d="M1120,208 V230 H720 V248" fill="none" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#arr)"/>
  <g>
    <rect x="540" y="250" width="360" height="60" rx="14" fill="#1B4332"/>
    <text x="720" y="280" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">🏠  Hjem — «Dine turneringer»</text>
    <text x="720" y="299" text-anchor="middle" font-size="12" fill="#C9A961">samler aktive, kommende og ferdige spill</text>
  </g>

  <!-- branch to lanes -->
  <path d="M720,310 V335 H370 V356" fill="none" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M720,335 H1070 V356" fill="none" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- lane divider -->
  <line x1="720" y1="360" x2="720" y2="912" stroke="#D8D2C4" stroke-width="1.5" stroke-dasharray="3 5"/>

  <!-- ===== LANE HEADERS ===== -->
  <rect x="60" y="360" width="620" height="46" rx="12" fill="#E3EDE6" stroke="#2D6A4F"/>
  <text x="370" y="389" text-anchor="middle" font-size="17" font-weight="700" letter-spacing="1" fill="#1B4332">⛳  SPILLER</text>
  <rect x="760" y="360" width="620" height="46" rx="12" fill="#F4EBD7" stroke="#C9A961"/>
  <text x="1070" y="389" text-anchor="middle" font-size="17" font-weight="700" letter-spacing="1" fill="#8A6D27">🗂  ARRANGØR</text>

  <!-- ===== SPILLER STEPS ===== -->
  <!-- helper: box x110 w520, badge circle x144, text x178 -->
  <g font-size="15" fill="#213029">
    <!-- S1 -->
    <rect x="110" y="430" width="520" height="58" rx="13" fill="#FFFFFF" stroke="#9DBFAC" stroke-width="1.5"/>
    <circle cx="144" cy="459" r="15" fill="#2D6A4F"/><text x="144" y="464" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
    <text x="176" y="464">Bli med — invitasjon, åpen påmelding eller lag</text>
    <!-- S2 -->
    <rect x="110" y="514" width="520" height="58" rx="13" fill="#FFFFFF" stroke="#9DBFAC" stroke-width="1.5"/>
    <circle cx="144" cy="543" r="15" fill="#2D6A4F"/><text x="144" y="548" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
    <text x="176" y="548">Åpne spillet</text>
    <!-- S3 -->
    <rect x="110" y="598" width="520" height="58" rx="13" fill="#FFFFFF" stroke="#9DBFAC" stroke-width="1.5"/>
    <circle cx="144" cy="627" r="15" fill="#2D6A4F"/><text x="144" y="632" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
    <text x="176" y="623">Tast slag, hull for hull</text>
    <text x="176" y="641" font-size="12.5" fill="#6B7770">lagres offline, synker av seg selv</text>
    <!-- S4 -->
    <rect x="110" y="682" width="520" height="58" rx="13" fill="#FFFFFF" stroke="#9DBFAC" stroke-width="1.5"/>
    <circle cx="144" cy="711" r="15" fill="#2D6A4F"/><text x="144" y="716" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">4</text>
    <text x="176" y="716">Gjennomgå scorekortet</text>
    <!-- S5 -->
    <rect x="110" y="766" width="520" height="58" rx="13" fill="#FFFFFF" stroke="#9DBFAC" stroke-width="1.5"/>
    <circle cx="144" cy="795" r="15" fill="#2D6A4F"/><text x="144" y="800" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">5</text>
    <text x="176" y="800">Lever — evt. godkjent av en i flighten</text>
    <!-- S6 -->
    <rect x="110" y="850" width="520" height="58" rx="13" fill="#FFFFFF" stroke="#9DBFAC" stroke-width="1.5"/>
    <circle cx="144" cy="879" r="15" fill="#2D6A4F"/><text x="144" y="884" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">6</text>
    <text x="176" y="884">Se leaderboard — live, og endelig til slutt</text>
  </g>
  <line x1="370" y1="488" x2="370" y2="512" stroke="#5E6B63" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="572" x2="370" y2="596" stroke="#5E6B63" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="656" x2="370" y2="680" stroke="#5E6B63" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="740" x2="370" y2="764" stroke="#5E6B63" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="824" x2="370" y2="848" stroke="#5E6B63" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== ARRANGØR STEPS ===== -->
  <g font-size="15" fill="#213029">
    <!-- A1 -->
    <rect x="810" y="430" width="520" height="58" rx="13" fill="#FFFFFF" stroke="#D8C089" stroke-width="1.5"/>
    <circle cx="844" cy="459" r="15" fill="#B8973F"/><text x="844" y="464" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
    <text x="876" y="455">Opprett spill — 5-stegs veiviser</text>
    <text x="876" y="473" font-size="12" fill="#6B7770">Arrangement → Format → Bane → Spillere → Klar</text>
    <!-- A2 -->
    <rect x="810" y="514" width="520" height="58" rx="13" fill="#FFFFFF" stroke="#D8C089" stroke-width="1.5"/>
    <circle cx="844" cy="543" r="15" fill="#B8973F"/><text x="844" y="548" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
    <text x="876" y="548">Publiser &amp; inviter spillere</text>
    <!-- A3 -->
    <rect x="810" y="598" width="520" height="58" rx="13" fill="#FFFFFF" stroke="#D8C089" stroke-width="1.5"/>
    <circle cx="844" cy="627" r="15" fill="#B8973F"/><text x="844" y="632" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
    <text x="876" y="632">Start runden — automatisk ved tee-off</text>
    <!-- A4 -->
    <rect x="810" y="682" width="520" height="58" rx="13" fill="#FFFFFF" stroke="#D8C089" stroke-width="1.5"/>
    <circle cx="844" cy="711" r="15" fill="#B8973F"/><text x="844" y="716" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">4</text>
    <text x="876" y="716">Godkjenn scorekort underveis</text>
    <!-- A5 -->
    <rect x="810" y="766" width="520" height="58" rx="13" fill="#FFFFFF" stroke="#D8C089" stroke-width="1.5"/>
    <circle cx="844" cy="795" r="15" fill="#B8973F"/><text x="844" y="800" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">5</text>
    <text x="876" y="800">Avslutt — resultatet sendes på mail</text>
    <!-- A6 -->
    <rect x="810" y="850" width="520" height="58" rx="13" fill="#FBF7EE" stroke="#D8C089" stroke-width="1.5" stroke-dasharray="4 4"/>
    <circle cx="844" cy="879" r="15" fill="#9C8552"/><text x="844" y="884" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">+</text>
    <text x="876" y="884">Forvalt: baner, spillere, cup, formater</text>
  </g>
  <line x1="1070" y1="488" x2="1070" y2="512" stroke="#5E6B63" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="1070" y1="572" x2="1070" y2="596" stroke="#5E6B63" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="1070" y1="656" x2="1070" y2="680" stroke="#5E6B63" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="1070" y1="740" x2="1070" y2="764" stroke="#5E6B63" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== CROSS-LINKS ===== -->
  <path d="M810,543 C700,520 690,480 634,463" fill="none" stroke="#A9A395" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrL)"/>
  <text x="690" y="500" text-anchor="middle" font-size="12" font-style="italic" fill="#8A8472">inviterer →</text>
  <path d="M634,793 C720,775 730,730 806,711" fill="none" stroke="#A9A395" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrL)"/>
  <text x="724" y="762" text-anchor="middle" font-size="12" font-style="italic" fill="#8A8472">leverer →</text>

  <!-- ===== STATUS STRIP ===== -->
  <text x="720" y="950" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="2" fill="#B8973F">SPILLETS STATUS</text>
  <g font-size="15" font-weight="600">
    <rect x="150" y="966" width="240" height="50" rx="25" fill="#ECEAE3" stroke="#B9B3A7"/><text x="270" y="997" text-anchor="middle" fill="#6B6258">Utkast</text>
    <rect x="450" y="966" width="240" height="50" rx="25" fill="#E7EEF6" stroke="#6B9AD1"/><text x="570" y="997" text-anchor="middle" fill="#2E5C8A">Planlagt</text>
    <rect x="750" y="966" width="240" height="50" rx="25" fill="#E3EDE6" stroke="#2D6A4F"/><text x="870" y="997" text-anchor="middle" fill="#1B4332">Pågående</text>
    <rect x="1050" y="966" width="240" height="50" rx="25" fill="#F4EBD7" stroke="#C9A961"/><text x="1170" y="997" text-anchor="middle" fill="#8A6D27">Avsluttet</text>
  </g>
  <line x1="390" y1="991" x2="446" y2="991" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="690" y1="991" x2="746" y2="991" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="990" y1="991" x2="1046" y2="991" stroke="#5E6B63" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="720" y="1040" text-anchor="middle" font-size="13" fill="#6B7770">Arrangøren styrer overgangene · «Pågående» starter automatisk ved tee-off</text>
</svg>
